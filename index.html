<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>✨ 3 в ряд</title>
    <style>
        /* --- ОБЩИЕ СБРОСЫ --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            background: #0a0a1a;
            overflow: hidden;
            touch-action: none;
            margin: 0;
            padding: 0;
        }
        .app {
            position: relative;
            width: 100%;
            max-width: 430px;
            height: 100vh;
            max-height: 860px;
            background: linear-gradient(145deg, #141429, #1a1a3e);
            border-radius: 32px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 80px rgba(0,0,0,0.9);
        }

        /* --- МЕНЮ --- */
        #menu {
            position: absolute;
            inset: 0;
            z-index: 50;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(ellipse at 50% 30%, #1a2a5e, #0a0a1a);
            padding: 30px;
            transition: opacity 0.5s ease, transform 0.5s ease;
            border-radius: 32px;
        }
        #menu.hidden {
            opacity: 0;
            transform: scale(1.05);
            pointer-events: none;
        }
        #menu .logo {
            font-size: 48px;
            font-weight: 900;
            background: linear-gradient(135deg, #f1c40f, #e94560);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
        }
        #menu .subtitle {
            color: rgba(255,255,255,0.3);
            font-size: 13px;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-bottom: 24px;
        }
        #menu input {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px;
            padding: 16px 20px;
            color: #fff;
            font-size: 18px;
            width: 85%;
            max-width: 300px;
            text-align: center;
            outline: none;
            margin-bottom: 14px;
        }
        #menu input::placeholder { color: rgba(255,255,255,0.25); }
        #menu input:focus { border-color: #e94560; }
        #menu .btn {
            background: linear-gradient(135deg, #e94560, #c73652);
            border: none;
            color: #fff;
            padding: 18px 50px;
            border-radius: 50px;
            font-size: 22px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 8px 30px rgba(233,69,96,0.35);
            width: 85%;
            max-width: 300px;
            touch-action: manipulation;
            transition: transform 0.15s;
        }
        #menu .btn:active { transform: scale(0.95); }
        #menu .footer-links {
            color: rgba(255,255,255,0.2);
            font-size: 16px;
            margin-top: 20px;
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 20px;
            background: rgba(255,255,255,0.03);
            touch-action: manipulation;
        }
        #menu .footer-links:active { color: #fff; background: rgba(255,255,255,0.08); }

        /* --- ХЕДЕР --- */
        #header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px 6px 16px;
            color: #fff;
            flex-shrink: 0;
            background: linear-gradient(180deg, rgba(20,20,41,0.95) 0%, transparent 100%);
            z-index: 10;
            opacity: 0;
            transition: opacity 0.3s;
            min-height: 44px;
        }
        #header.visible { opacity: 1; }
        #header .logo-small {
            font-size: 14px;
            font-weight: 800;
            background: linear-gradient(135deg, #f1c40f, #e94560);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        #header .right {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }
        #header .badge {
            background: rgba(255,255,255,0.07);
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 700;
            color: #fff;
            border: 1px solid rgba(255,255,255,0.06);
        }
        #header .badge span { color: #f1c40f; }
        #header .timer {
            background: rgba(255,255,255,0.07);
            padding: 4px 8px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
            color: #fff;
            border: 1px solid rgba(255,255,255,0.06);
            min-width: 40px;
            text-align: center;
        }
        #header .timer.warning { color: #e94560; animation: pulse 0.6s infinite alternate; }
        @keyframes pulse { from { opacity: 1; } to { opacity: 0.5; } }
        #header .nick {
            background: rgba(255,255,255,0.06);
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 11px;
            color: rgba(255,255,255,0.5);
            border: 1px solid rgba(255,255,255,0.04);
            max-width: 70px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* --- КАНВАС --- */
        .canvas-wrap {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 4px 10px;
            min-height: 0;
            touch-action: none;
        }
        canvas {
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 16px;
            background: #0f1a2e;
            box-shadow: inset 0 0 60px rgba(0,0,0,0.5), 0 8px 40px rgba(0,0,0,0.6);
            touch-action: none;
            max-width: 400px;
            max-height: 400px;
            cursor: grab;
        }
        canvas:active { cursor: grabbing; }

        /* --- ФУТЕР --- */
        #footer {
            display: flex;
            justify-content: space-between;
            padding: 6px 12px 12px 12px;
            flex-shrink: 0;
            gap: 6px;
            background: linear-gradient(0deg, rgba(20,20,41,0.95) 0%, transparent 100%);
        }
        #footer button {
            background: rgba(255,255,255,0.06);
            border: none;
            color: rgba(255,255,255,0.6);
            padding: 10px 12px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.04);
            flex: 1;
            text-align: center;
            touch-action: manipulation;
            transition: background 0.15s, transform 0.15s;
        }
        #footer button:active { transform: scale(0.95); background: rgba(255,255,255,0.12); }
        #footer .primary {
            background: linear-gradient(135deg, #e94560, #c73652);
            color: #fff;
            border: none;
            box-shadow: 0 4px 20px rgba(233,69,96,0.3);
            flex: 1.2;
        }

        /* --- МОДАЛ --- */
        #modal {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(20px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            padding: 20px;
            border-radius: 32px;
        }
        #modal.open { display: flex; }
        #modal .box {
            background: linear-gradient(160deg, #1e1e42, #141429);
            border-radius: 28px;
            padding: 24px 20px 20px 20px;
            max-width: 360px;
            width: 100%;
            max-height: 80vh;
            border: 1px solid rgba(255,255,255,0.06);
            box-shadow: 0 30px 80px rgba(0,0,0,0.8);
        }
        #modal .box h2 { color: #fff; font-size: 22px; text-align: center; }
        #modal .box .sub { color: rgba(255,255,255,0.25); text-align: center; font-size: 13px; margin-bottom: 12px; }
        #modal .box .list { overflow-y: auto; max-height: 50vh; }
        #modal .box .list .item {
            display: flex;
            justify-content: space-between;
            padding: 8px 4px;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            color: rgba(255,255,255,0.6);
            font-size: 15px;
        }
        #modal .box .list .item .rank { font-weight: 600; width: 36px; color: rgba(255,255,255,0.2); }
        #modal .box .list .item .rank.gold { color: #ffd700; }
        #modal .box .list .item .rank.silver { color: #c0c0c0; }
        #modal .box .list .item .rank.bronze { color: #cd7f32; }
        #modal .box .list .item .val { font-weight: 700; color: #fff; }
        #modal .box .empty { color: rgba(255,255,255,0.15); text-align: center; padding: 20px 0; font-size: 13px; }
        #modal .box .close-btn {
            width: 100%;
            margin-top: 12px;
            padding: 14px;
            background: rgba(255,255,255,0.06);
            border: none;
            border-radius: 30px;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            touch-action: manipulation;
        }
        #modal .box .close-btn:active { transform: scale(0.94); background: rgba(255,255,255,0.12); }

        /* --- АДАПТАЦИЯ --- */
        @media (max-width: 440px) {
            .app { border-radius: 0; max-height: 100vh; }
            #menu { border-radius: 0; }
            #modal { border-radius: 0; }
            #menu .logo { font-size: 36px; }
            #menu .btn { padding: 16px 30px; font-size: 19px; }
            #menu input { font-size: 16px; padding: 14px 16px; }
        }
        @media (max-height: 700px) {
            #menu .logo { font-size: 30px; }
            #menu .btn { padding: 12px 24px; font-size: 17px; }
            #menu input { padding: 10px 16px; font-size: 14px; }
            #header { padding: 8px 12px 4px 12px; min-height: 36px; }
            #header .badge { font-size: 11px; padding: 2px 8px; }
            #footer { padding: 4px 10px 8px 10px; }
            #footer button { font-size: 11px; padding: 6px 8px; }
            .canvas-wrap { padding: 2px 8px; }
        }
        @media (pointer: coarse) {
            /* Для сенсорных экранов увеличиваем кнопки */
            #menu .btn { padding: 20px 50px; font-size: 24px; }
            #menu input { padding: 18px 20px; font-size: 20px; }
            #footer button { padding: 12px 14px; font-size: 15px; }
        }
    </style>
</head>
<body>

<div class="app" id="app">

    <!-- МЕНЮ -->
    <div id="menu">
        <div class="logo">✦ 3 в ряд</div>
        <div class="subtitle">сохраняй рекорды</div>
        <input id="nickInput" type="text" placeholder="Введи свой никнейм" maxlength="20">
        <button class="btn" id="playBtn">▶ ИГРАТЬ</button>
        <div class="footer-links" id="menuRecordsBtn">🏆 Рекорды</div>
    </div>

    <!-- ХЕДЕР -->
    <div id="header">
        <div class="logo-small">✦ 3 в ряд</div>
        <div class="right">
            <div class="nick" id="nickBadge">Гость</div>
            <div class="badge">🎯 <span id="scoreDisplay">0</span></div>
            <div class="timer" id="timerDisplay">⏱ 60</div>
        </div>
    </div>

    <!-- КАНВАС -->
    <div class="canvas-wrap">
        <canvas id="canvas" width="400" height="400"></canvas>
    </div>

    <!-- ФУТЕР -->
    <div id="footer">
        <button id="footerRecordsBtn">🏆</button>
        <button id="restartBtn">🔄 Сброс</button>
        <button class="primary" id="homeBtn">🏠 Меню</button>
    </div>

    <!-- МОДАЛ -->
    <div id="modal">
        <div class="box">
            <h2>🏆 Мои рекорды</h2>
            <div class="sub">твои лучшие результаты</div>
            <div class="list" id="recordsList"></div>
            <button class="close-btn" id="modalCloseBtn">✕ Закрыть</button>
        </div>
    </div>
</div>

<script>
// ============================================================
// 0. РЕКОРДЫ (localStorage)
// ============================================================
let currentNick = '';

function getRecords() {
    try { return JSON.parse(localStorage.getItem('game_records')) || {}; } catch { return {}; }
}
function saveRecords(data) {
    localStorage.setItem('game_records', JSON.stringify(data));
}
function addRecord(nick, score) {
    let all = getRecords();
    if (!all[nick]) all[nick] = [];
    all[nick].push(score);
    all[nick].sort((a,b) => b - a);
    if (all[nick].length > 10) all[nick].length = 10;
    saveRecords(all);
    return all[nick];
}
function getPlayerRecords(nick) {
    let all = getRecords();
    return all[nick] || [];
}

// ============================================================
// 1. ИГРА
// ============================================================
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const scoreDisplay = document.getElementById('scoreDisplay');
const timerDisplay = document.getElementById('timerDisplay');
const nickBadge = document.getElementById('nickBadge');

const SIZE = 8;
const TILE = 400 / SIZE;
const EMOJIS = ['🍎', '⭐', '🍒', '💎', '🍉'];
const DURATION = 60;

let grid = [];
let score = 0;
let timer = DURATION;
let gameActive = false;
let timerInterval = null;
let isProcessing = false;
let dropAnims = [];
let popAnims = [];
let sparkles = [];
let comboCount = 0;
let swipeAnim = null;
let animId = null;
let isGameOver = false;

// ===== МЕНЮ =====
const menu = document.getElementById('menu');
const header = document.getElementById('header');
const nickInput = document.getElementById('nickInput');

function showMenu() {
    menu.classList.remove('hidden');
    header.classList.remove('visible');
}
function hideMenu() {
    menu.classList.add('hidden');
    header.classList.add('visible');
}

// ===== ИНИЦИАЛИЗАЦИЯ =====
function initGrid() {
    grid = [];
    for (let r = 0; r < SIZE; r++) {
        grid[r] = [];
        for (let c = 0; c < SIZE; c++) {
            grid[r][c] = Math.floor(Math.random() * EMOJIS.length);
        }
    }
    let attempts = 0;
    while (findMatches().size > 0 && attempts < 100) {
        for (let r = 0; r < SIZE; r++) {
            for (let c = 0; c < SIZE; c++) {
                if (grid[r][c] !== null) grid[r][c] = Math.floor(Math.random() * EMOJIS.length);
            }
        }
        attempts++;
    }
    dropAnims = [];
    for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
            dropAnims.push({ row: r, col: c, progress: 0, delay: (r + c) * 30 + Math.random() * 20 });
        }
    }
    sparkles = [];
    comboCount = 0;
    swipeAnim = null;
    isGameOver = false;
}

function findMatches() {
    const matches = new Set();
    for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE - 2; c++) {
            if (grid[r][c] === null) continue;
            if (grid[r][c] === grid[r][c+1] && grid[r][c] === grid[r][c+2]) {
                matches.add(r+','+c); matches.add(r+','+(c+1)); matches.add(r+','+(c+2));
            }
        }
    }
    for (let r = 0; r < SIZE - 2; r++) {
        for (let c = 0; c < SIZE; c++) {
            if (grid[r][c] === null) continue;
            if (grid[r][c] === grid[r+1][c] && grid[r][c] === grid[r+2][c]) {
                matches.add(r+','+c); matches.add((r+1)+','+c); matches.add((r+2)+','+c);
            }
        }
    }
    return matches;
}

function dropDown() {
    let dropped = false;
    const newDrops = [];
    for (let c = 0; c < SIZE; c++) {
        let emptyCount = 0;
        for (let r = SIZE - 1; r >= 0; r--) {
            if (grid[r][c] === null) {
                emptyCount++;
            } else if (emptyCount > 0) {
                grid[r + emptyCount][c] = grid[r][c];
                grid[r][c] = null;
                dropped = true;
                newDrops.push({ row: r + emptyCount, col: c, progress: 0, delay: (r + c) * 20 + Math.random() * 10 });
            }
        }
        for (let r = 0; r < emptyCount; r++) {
            grid[r][c] = Math.floor(Math.random() * EMOJIS.length);
            newDrops.push({ row: r, col: c, progress: 0, delay: (r + c) * 20 + Math.random() * 10 });
            dropped = true;
        }
    }
    for (const d of newDrops) dropAnims.push(d);
    return dropped;
}

function processMatches() {
    const matches = findMatches();
    if (matches.size === 0) return false;

    comboCount++;
    const bonus = comboCount > 1 ? Math.floor(comboCount * 5) : 0;
    const points = matches.size * 10 + bonus;
    score += points;
    scoreDisplay.textContent = score;

    for (const pos of matches) {
        const [r, c] = pos.split(',').map(Number);
        popAnims.push({ row: r, col: c, progress: 0 });
        for (let i = 0; i < 5; i++) {
            sparkles.push({
                x: c * TILE + TILE/2,
                y: r * TILE + TILE/2,
                vx: (Math.random() - 0.5) * 6,
                vy: (Math.random() - 0.5) * 6 - 2,
                life: 1,
                size: 3 + Math.random() * 4,
                color: ['#ffd700', '#e94560', '#f1c40f', '#2ecc71', '#3498db'][Math.floor(Math.random() * 5)]
            });
        }
    }

    for (const pos of matches) {
        const [r, c] = pos.split(',').map(Number);
        grid[r][c] = null;
    }
    dropDown();
    return true;
}

function processAllMatches() {
    if (isProcessing) return;
    isProcessing = true;
    let iter = 0;
    function step() {
        if (iter > 20 || isGameOver) { isProcessing = false; return; }
        if (!processMatches()) {
            isProcessing = false;
            if (!hasValidMoves() && !isGameOver) {
                setTimeout(shuffleGrid, 300);
            }
            return;
        }
        iter++;
        setTimeout(step, 250);
    }
    step();
}

function hasValidMoves() {
    for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
            if (c < SIZE - 1) {
                [grid[r][c], grid[r][c+1]] = [grid[r][c+1], grid[r][c]];
                if (findMatches().size > 0) {
                    [grid[r][c], grid[r][c+1]] = [grid[r][c+1], grid[r][c]];
                    return true;
                }
                [grid[r][c], grid[r][c+1]] = [grid[r][c+1], grid[r][c]];
            }
            if (r < SIZE - 1) {
                [grid[r][c], grid[r+1][c]] = [grid[r+1][c], grid[r][c]];
                if (findMatches().size > 0) {
                    [grid[r][c], grid[r+1][c]] = [grid[r+1][c], grid[r][c]];
                    return true;
                }
                [grid[r][c], grid[r+1][c]] = [grid[r+1][c], grid[r][c]];
            }
        }
    }
    return false;
}

function shuffleGrid() {
    const flat = [];
    for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
            flat.push(grid[r][c]);
        }
    }
    for (let i = flat.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [flat[i], flat[j]] = [flat[j], flat[i]];
    }
    let idx = 0;
    for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
            grid[r][c] = flat[idx++];
        }
    }
    processAllMatches();
}

// =====
