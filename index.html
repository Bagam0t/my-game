<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>3 в ряд</title>
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #1a1a2e; font-family: Arial; }
        .game { text-align: center; background: #16213e; padding: 20px; border-radius: 16px; }
        canvas { background: #0f3460; border-radius: 12px; cursor: pointer; }
        .info { color: #fff; margin-top: 12px; font-size: 20px; display: flex; justify-content: space-between; padding: 0 10px; }
        button { background: #e94560; color: #fff; border: none; padding: 8px 24px; border-radius: 8px; font-size: 18px; cursor: pointer; }
        button:hover { background: #c73652; }
    </style>
</head>
<body>
<div class="game">
    <h2 style="color:#fff; margin:0 0 12px;">🍎 3 в ряд</h2>
    <canvas id="canvas" width="300" height="300"></canvas>
    <div class="info">
        <span>Очки: <b id="score">0</b></span>
        <button onclick="restart()">🔄 Заново</button>
    </div>
</div>
<script>
    const SIZE = 8;
    const TILE_SIZE = 300 / SIZE;
    const COLORS = ['#e74c3c','#f1c40f','#2ecc71','#3498db','#9b59b6'];
    const EMOJIS = ['🍎','⭐','🍒','💎','🍉'];

    let grid = [];
    let score = 0;
    let selected = null;

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    function initGrid() {
        for (let r = 0; r < SIZE; r++) {
            grid[r] = [];
            for (let c = 0; c < SIZE; c++) {
                grid[r][c] = Math.floor(Math.random() * 5);
            }
        }
        // Убираем совпадения при старте
        while (findMatches().length > 0) {
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    if (grid[r][c] !== null) grid[r][c] = Math.floor(Math.random() * 5);
                }
            }
        }
    }

    function findMatches() {
        let matches = new Set();
        // Горизонтальные
        for (let r = 0; r < SIZE; r++) {
            for (let c = 0; c < SIZE - 2; c++) {
                if (grid[r][c] === null) continue;
                if (grid[r][c] === grid[r][c+1] && grid[r][c] === grid[r][c+2]) {
                    matches.add(r+','+c); matches.add(r+','+(c+1)); matches.add(r+','+(c+2));
                }
            }
        }
        // Вертикальные
        for (let r = 0; r < SIZE - 2; r++) {
            for (let c = 0; c < SIZE; c++) {
                if (grid[r][c] === null) continue;
                if (grid[r][c] === grid[r+1][c] && grid[r][c] === grid[r+2][c]) {
                    matches.add(r+','+c); matches.add((r+1)+','+c); matches.add((r+2)+','+c);
                }
            }
        }
        return matches;
    }

    function dropDown() {
        let dropped = false;
        for (let c = 0; c < SIZE; c++) {
            for (let r = SIZE-1; r >= 0; r--) {
                if (grid[r][c] === null) {
                    for (let k = r-1; k >= 0; k--) {
                        if (grid[k][c] !== null) {
                            grid[r][c] = grid[k][c];
                            grid[k][c] = null;
                            dropped = true;
                            break;
                        }
                    }
                    if (grid[r][c] === null) {
                        grid[r][c] = Math.floor(Math.random() * 5);
                        dropped = true;
                    }
                }
            }
        }
        return dropped;
    }

    function processMatches() {
        let matches = findMatches();
        if (matches.size === 0) return false;
        score += matches.size * 10;
        document.getElementById('score').textContent = score;
        for (let pos of matches) {
            let [r,c] = pos.split(',').map(Number);
            grid[r][c] = null;
        }
        while (dropDown()) {}
        return true;
    }

    function draw() {
        ctx.clearRect(0, 0, 300, 300);
        for (let r = 0; r < SIZE; r++) {
            for (let c = 0; c < SIZE; c++) {
                let x = c * TILE_SIZE, y = r * TILE_SIZE;
                ctx.fillStyle = '#1a3a5c';
                ctx.fillRect(x, y, TILE_SIZE-1, TILE_SIZE-1);
                if (grid[r][c] !== null) {
                    ctx.font = (TILE_SIZE-6) + 'px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillStyle = '#fff';
                    ctx.fillText(EMOJIS[grid[r][c]], x + TILE_SIZE/2, y + TILE_SIZE/2 + 2);
                    if (selected && selected[0] === r && selected[1] === c) {
                        ctx.strokeStyle = '#fff';
                        ctx.lineWidth = 3;
                        ctx.strokeRect(x+2, y+2, TILE_SIZE-5, TILE_SIZE-5);
                    }
                }
            }
        }
    }

    function restart() {
        initGrid();
        score = 0;
        selected = null;
        document.getElementById('score').textContent = '0';
        draw();
    }

    canvas.addEventListener('click', function(e) {
        let rect = canvas.getBoundingClientRect();
        let x = (e.clientX - rect.left) * (300 / rect.width);
        let y = (e.clientY - rect.top) * (300 / rect.height);
        let col = Math.floor(x / TILE_SIZE);
        let row = Math.floor(y / TILE_SIZE);
        if (row >= SIZE || col >= SIZE) return;

        if (selected === null) {
            selected = [row, col];
            draw();
            return;
        }

        let [r1, c1] = selected;
        if (r1 === row && c1 === col) {
            selected = null;
            draw();
            return;
        }

        // Проверяем соседство
        if (Math.abs(r1 - row) + Math.abs(c1 - col) !== 1) {
            selected = [row, col];
            draw();
            return;
        }

        // Меняем
        [grid[r1][c1], grid[row][col]] = [grid[row][col], grid[r1][c1]];
        selected = null;

        if (!processMatches()) {
            // Откат, если нет совпадений
            [grid[r1][c1], grid[row][col]] = [grid[row][col], grid[r1][c1]];
        }
        draw();
    });

    initGrid();
    draw();
</script>
</body>
</html>
