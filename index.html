<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">

    <style>
        /* Стили такие же, как в варианте А, но с небольшими дополнениями */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        html, body { width: 100%; height: 100%; overflow: hidden; touch-action: none; }

<body>

<div class="app" id="app">

<script>
// ============================================================
// 0. ПОДКЛЮЧЕНИЕ К GOOGLE SHEETS
// ============================================================
// ⚠️ ЗАМЕНИ ЭТУ СТРОКУ НА СВОЙ URL ОТ GOOGLE APPS SCRIPT!
const BACKEND_URL = "https://script.google.com/macros/s/AKfycby74mAAkOYbFXRYSGm8AqwpfkpTaJv4OTNL7D9xUI6L2va9xOjLUl83wjJD42ovmjWv/exec";

let onlineEnabled = false;
let currentNickname = '';

// Проверка подключения к серверу
async function checkConnection() {
    try {
        const response = await fetch(BACKEND_URL);
        if (response.ok) {
            onlineEnabled = true;
            document.getElementById('connectionStatus').textContent = '✅ Онлайн режим активен';
            document.getElementById('connectionStatus').className = 'status online';
            return true;
        }
    } catch(e) {
        onlineEnabled = false;
        document.getElementById('connectionStatus').textContent = '⚠️ Офлайн режим (рекорды локально)';
        document.getElementById('connectionStatus').className = 'status offline';
        return false;
    }
}

// Сохранение рекорда в Google Sheets
async function saveOnlineRecord(mode, nickname, score) {
    if (!onlineEnabled) return false;
    try {
        const response = await fetch(BACKEND_URL, {
            method: "POST",
            mode: "cors",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                action: "save",
                mode: mode,
                nickname: nickname,
                score: score
            })
        });
        const data = await response.json();
        return data.success;
    } catch(e) {
        return false;
    }
}

// Получение топ-50 рекордов из Google Sheets
async function getOnlineRecords(mode) {
    if (!onlineEnabled) return [];
    try {
        const response = await fetch(BACKEND_URL + "?action=records&mode=" + encodeURIComponent(mode));
        const data = await response.json();
        return data.records || [];
    } catch(e) {
        return [];
    }
}

// Обновление онлайн-бейджей в меню
async function updateOnlineBadges() {
    if (!onlineEnabled) return;
    const modes = ['1min', '2min', '5min', '50moves'];
    for (const mode of modes) {
        const records = await getOnlineRecords(mode);
        const el = document.getElementById('online-' + mode);
        if (el) {
            const best = records.length > 0 ? records[0].score : 0;
            el.textContent = '🌐 ' + best;
        }
    }
}

// ============================================================
// 1. ЗВУКОВАЯ СИСТЕМА
// ============================================================
class SoundEngine {
    constructor() {
        this.ctx = null;
        this.enabled = true;
        this.initialized = false;
    }
    init() {
        if (this.initialized) return;
        try {
            this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            this.initialized = true;
        } catch(e) { /* тихо */ }
    }
    toggle() {
        this.enabled = !this.enabled;
        return this.enabled;
    }
    play(freq, dur, type = 'sine', vol = 0.3) {
        if (!this.enabled || !this.initialized) return;
        try {
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
            gain.gain.setValueAtTime(vol, this.ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + dur);
            osc.connect(gain);
            gain.connect(this.ctx.destination);
            osc.start();
            osc.stop(this.ctx.currentTime + dur);
        } catch(e) { /* тихо */ }
    }
    select() { this.play(600, 0.08, 'sine', 0.15); }
    swap() { this.play(800, 0.1, 'sine', 0.2); setTimeout(() => this.play(1000, 0.08, 'sine', 0.15), 80); }
    match() { this.play(523, 0.12, 'sine', 0.25); setTimeout(() => this.play(659, 0.12, 'sine', 0.2), 100); setTimeout(() => this.play(784, 0.15, 'sine', 0.2), 200); }
    combo() { for (let i=0;i<3;i++) { setTimeout(()=>{ this.play(523+i*80,0.1,'square',0.12); }, i*70); } setTimeout(()=>this.play(880,0.2,'sine',0.25),210); }
    fail() { this.play(300,0.25,'sawtooth',0.15); setTimeout(()=>this.play(250,0.3,'sawtooth',0.12),150); }
    gameOver() { this.play(440,0.15,'sine',0.2); setTimeout(()=>this.play(350,0.2,'sine',0.2),150); setTimeout(()=>this.play(280,0.4,'sine',0.25),300); }
    record() { for (let i=0;i<5;i++) { setTimeout(()=>{ this.play(523+i*100,0.12,'sine',0.2); }, i*100); } setTimeout(()=>this.play(880,0.3,'sine',0.3),500); }
}

    saveLocalRecords(all);
    return all[mode];
}

}
function getLocalBestScore(mode) {

// ===== ИНИЦИАЛИЗАЦИЯ =====
function initGrid() {
    grid = [];
    for (let r = 0; r < SIZE; r++) {
        grid[r] = [];
        for (let c = 0; c < SIZE; c++) {
            grid[r][c] = Math.floor(Math.random() * EMOJIS.length);
        }
    }
    let attempts = 0;
    while (findMatches().size > 0 && attempts < 100) {
        for (let r = 0; r < SIZE; r++) {
            for (let c = 0; c < SIZE; c++) {
                if (grid[r][c] !== null) grid[r][c] = Math.floor(Math.random() * EMOJIS.length);
            }
        }
        attempts++;
    }
    dropAnims = [];
    for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
            dropAnims.push({ row: r, col: c, progress: 0, delay: (r + c) * 30 + Math.random() * 20 });
        }
    }
    sparkles = [];
    comboCount = 0;
    swipeAnim = null;
    isGameOver = false;
}

function findMatches() {
    const matches = new Set();
    for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE - 2; c++) {
            if (grid[r][c] === null) continue;
            if (grid[r][c] === grid[r][c+1] && grid[r][c] === grid[r][c+2]) {
                matches.add(r+','+c); matches.add(r+','+(c+1)); matches.add(r+','+(c+2));
            }
        }
    }
    for (let r = 0; r < SIZE - 2; r++) {
        for (let c = 0; c < SIZE; c++) {
            if (grid[r][c] === null) continue;
            if (grid[r][c] === grid[r+1][c] && grid[r][c] === grid[r+2][c]) {
                matches.add(r+','+c); matches.add((r+1)+','+c); matches.add((r+2)+','+c);
            }
        }
    }
    return matches;
}

function dropDown() {
    let dropped = false;
    const newDrops = [];
    for (let c = 0; c < SIZE; c++) {
        let emptyCount = 0;
        for (let r = SIZE - 1; r >= 0; r--) {
            if (grid[r][c] === null) {
                emptyCount++;
            } else if (emptyCount > 0) {
                grid[r + emptyCount][c] = grid[r][c];
                grid[r][c] = null;
                dropped = true;
                newDrops.push({ row: r + emptyCount, col: c, progress: 0, delay: (r + c) * 20 + Math.random() * 10 });
            }
        }
        for (let r = 0; r < emptyCount; r++) {
            grid[r][c] = Math.floor(Math.random() * EMOJIS.length);
            newDrops.push({ row: r, col: c, progress: 0, delay: (r + c) * 20 + Math.random() * 10 });
            dropped = true;
        }
    }
    for (const d of newDrops) dropAnims.push(d);
    return dropped;
}

function processMatches() {
    const matches = findMatches();
    if (matches.size === 0) return false;

    comboCount++;
    const bonus = comboCount > 1 ? Math.floor(comboCount * 5) : 0;
    const points = matches.size * 10 + bonus;
    score += points;
    scoreDisplay.textContent = score;

    if (comboCount > 2) sound.combo();
    else sound.match();

    for (const pos of matches) {
        const [r, c] = pos.split(',').map(Number);
        popAnims.push({ row: r, col: c, progress: 0 });
        for (let i = 0; i < 5; i++) {
            sparkles.push({
                x: c * TILE + TILE/2,
                y: r * TILE + TILE/2,
                vx: (Math.random() - 0.5) * 6,
                vy: (Math.random() - 0.5) * 6 - 2,
                life: 1,
                size: 3 + Math.random() * 4,
                color: ['#ffd700', '#e94560', '#f1c40f', '#2ecc71', '#3498db'][Math.floor(Math.random() * 5)]
            });
        }
    }

    for (const pos of matches) {
        const [r, c] = pos.split(',').map(Number);
        grid[r][c] = null;
    }
    dropDown();
    return true;
}

function processAllMatches() {
    if (isProcessing) return;
    isProcessing = true;
    let iter = 0;
    function step() {
        if (iter > 20 || isGameOver) { isProcessing = false; return; }
        if (!processMatches()) {
            isProcessing = false;
            if (!hasValidMoves() && !isGameOver) {
                setTimeout(shuffleGrid, 300);
            }
            return;
        }
        iter++;
        setTimeout(step, 250);
    }
    step();
}

function hasValidMoves() {
    for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
            if (c < SIZE - 1) {
                [grid[r][c], grid[r][c+1]] = [grid[r][c+1], grid[r][c]];
                if (findMatches().size > 0) {
                    [grid[r][c], grid[r][c+1]] = [grid[r][c+1], grid[r][c]];
                    return true;
                }
                [grid[r][c], grid[r][c+1]] = [grid[r][c+1], grid[r][c]];
            }
            if (r < SIZE - 1) {
                [grid[r][c], grid[r+1][c]] = [grid[r+1][c], grid[r][c]];
                if (findMatches().size > 0) {
                    [grid[r][c], grid[r+1][c]] = [grid[r+1][c], grid[r][c]];
                    return true;
                }
                [grid[r][c], grid[r+1][c]] = [grid[r+1][c], grid[r][c]];
            }
        }
    }
    return false;
}

function shuffleGrid() {
    const flat = [];
    for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
            flat.push(grid[r][c]);
        }
    }
    for (let i = flat.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [flat[i], flat[j]] = [flat[j], flat[i]];
    }
    let idx = 0;
    for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
            grid[r][c] = flat[idx++];
        }
    }
    processAllMatches();
}

// ===== ОТРИСОВКА =====
function draw() {
    ctx.clearRect(0, 0, 400, 400);

    for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
            const x = c * TILE, y = r * TILE;
            ctx.fillStyle = (r + c) % 2 === 0 ? '#1a2a4a' : '#12203a';
            ctx.fillRect(x, y, TILE - 1, TILE - 1);
        }
    }

    for (const a of dropAnims) a.progress = Math.min(a.progress + 0.05, 1);
    dropAnims = dropAnims.filter(a => a.progress < 1);
    for (const a of popAnims) a.progress += 0.08;
    popAnims = popAnims.filter(a => a.progress < 1);

    for (const s of sparkles) {
        s.x += s.vx;
        s.y += s.vy;
        s.vy += 0.1;
        s.life -= 0.025;
    }
    sparkles = sparkles.filter(s => s.life > 0);

    const tiles = [];
    for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
            if (grid[r][c] === null) continue;
            tiles.push({ row: r, col: c, value: grid[r][c] });
        }
    }

    if (swipeAnim && swipeAnim.progress < 1) {
        swipeAnim.progress += 0.06;
        const ease = 1 - Math.pow(1 - swipeAnim.progress, 3);
        const offsetX = swipeAnim.offsetX * ease;
        const offsetY = swipeAnim.offsetY * ease;
        const val = grid[swipeAnim.row]?.[swipeAnim.col];
        if (val !== undefined && val !== null) {
            tiles.push({
                row: swipeAnim.row,
                col: swipeAnim.col,
                value: val,
                offsetX: offsetX,
                offsetY: offsetY,
                scale: 1 - 0.05 * ease,
                isSwiping: true
            });
        }
        if (swipeAnim.progress >= 1) {
            swipeAnim = null;
        }
    }

    for (const tile of tiles) {
        if (tile.value === undefined || tile.value === null) continue;

        const x = tile.col * TILE + TILE/2 + (tile.offsetX || 0);
        let y = tile.row * TILE + TILE/2 + (tile.offsetY || 0);
        let scale = tile.scale || 1;
        let opacity = 1;
        let rotation = 0;

        if (!tile.isSwiping) {
            const drop = dropAnims.find(a => a.row === tile.row && a.col === tile.col);
            if (drop) {
                const ease = 1 - Math.pow(1 - drop.progress, 3) * Math.cos(drop.progress * Math.PI * 0.3);
                y += (drop.row - tile.row) * TILE * (1 - ease) * 0.9;
                scale = 0.3 + 0.7 * ease;
                rotation = (1 - ease) * 0.05;
            }
        }

        const pop = popAnims.find(a => a.row === tile.row && a.col === tile.col);
        if (pop) {
            scale = 1 + pop.progress * 2.8;
            opacity = 1 - pop.progress;
            rotation = pop.progress * 0.3;
        }

        ctx.save();
        ctx.globalAlpha = opacity;
        ctx.translate(x, y);
        ctx.rotate(rotation);
        ctx.scale(scale, scale);

        const radius = TILE * 0.42;
        const grad = ctx.createRadialGradient(-radius*0.25, -radius*0.25, 0, 0, 0, radius);
        grad.addColorStop(0, 'rgba(255,255,255,0.2)');
        grad.addColorStop(0.5, 'rgba(255,255,255,0.03)');
        grad.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(0, 0, radius, 0, Math.PI*2);
        ctx.fill();

        ctx.font = (TILE - 8) + 'px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.shadowColor = 'rgba(0,0,0,0.5)';
        ctx.shadowBlur = 12;
        ctx.shadowOffsetY = 2;
        ctx.fillStyle = '#fff';
        ctx.fillText(EMOJIS[tile.value], 0, 2);
        ctx.shadowBlur = 0;

        ctx.restore();
    }

    for (const s of sparkles) {
        ctx.save();
        ctx.globalAlpha = s.life;
        ctx.fillStyle = s.color;
        ctx.shadowColor = s.color;
        ctx.shadowBlur = 10;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.size * s.life, 0, Math.PI*2);
        ctx.fill();
        ctx.restore();
    }

    if (swipeAnim && swipeAnim.progress < 0.8) {
        const alpha = 0.3 * (1 - swipeAnim.progress);
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.strokeStyle = '#f1c40f';
        ctx.lineWidth = 3;
        ctx.setLineDash([5, 8]);
        ctx.shadowColor = '#f1c40f';
        ctx.shadowBlur = 15;
        const startX = swipeAnim.startCol * TILE + TILE/2;
        const startY = swipeAnim.startRow * TILE + TILE/2;
        const endX = swipeAnim.col * TILE + TILE/2 + swipeAnim.offsetX * 0.5;
        const endY = swipeAnim.row * TILE + TILE/2 + swipeAnim.offsetY * 0.5;
        ctx.beginPath();
        ctx.moveTo(startX, startY);
        ctx.lineTo(endX, endY);
        ctx.stroke();
        ctx.restore();
    }

    animId = requestAnimationFrame(draw);
}

// ===== ТАЙМЕР =====
function startTimer() {
    if (timerInterval) clearInterval(timerInterval);
    const config = getModeConfig(currentMode);
    if (config.type === 'time') {
        timer = config.time;
        timerDisplay.textContent = '⏱ ' + timer;
        timerDisplay.className = 'timer';
        gameActive = true;
        isGameOver = false;
        timerInterval = setInterval(function() {
            timer--;
            timerDisplay.textContent = '⏱ ' + timer;
            if (timer <= 10) timerDisplay.className = 'timer warning';
            if (timer <= 0) {
                clearInterval(timerInterval);
                timerInterval = null;
                gameActive = false;
                isGameOver = true;
                timerDisplay.textContent = '⏱ 0';
                sound.gameOver();
                endGame();
            }
        }, 1000);
    } else {
        movesLeft = config.moves;
        timerDisplay.textContent = '🎯 ' + movesLeft;
        timerDisplay.className = 'timer';
        gameActive = true;
        isGameOver = false;
    }
}

async function endGame() {
    if (score > 0) {
        // Сохраняем локально
        const localRecords = addLocalRecord(currentMode, score);
        updateMenuBestScores();
        
        // Сохраняем онлайн, если есть подключение и никнейм
        let onlineSaved = false;
        if (onlineEnabled && currentNickname) {
            onlineSaved = await saveOnlineRecord(currentMode, currentNickname, score);
            if (onlineSaved) {
                updateOnlineBadges();
            }
        }
        
        const best = localRecords[0];
        if (best === score) {
            sound.record();
            setTimeout(function() {
                alert('🎉 НОВЫЙ РЕКОРД!\n' + getModeConfig(currentMode).label + ': ' + score + (onlineSaved ? ' ✅ Сохранён онлайн!' : ''));
            }, 300);
        } else {
            setTimeout(function() {
                alert('⏰ Время вышло!\nСчёт: ' + score + '\nЛучший: ' + best);
            }, 200);
        }
    } else {
        alert('⏰ Время вышло!\nСчёт: ' + score);
    }
}

// 4. СВАЙП
// ============================================================
function getGridPos(clientX, clientY) {
    const rect = canvas.getBoundingClientRect();
    const scale = 400 / rect.width;
    const x = (clientX - rect.left) * scale;
    const y = (clientY - rect.top) * scale;
    if (x < 0 || y < 0 || x > 400 || y > 400) return null;
    return { row: Math.floor(y / TILE), col: Math.floor(x / TILE) };
}

let sX = 0, sY = 0, sRow = -1, sCol = -1, isSwiping = false;

function onDown(cx, cy) {
    if (!gameActive || isProcessing || isGameOver) return;
    sound.init();
    const pos = getGridPos(cx, cy);
    if (!pos || pos.row >= SIZE || pos.col >= SIZE) return;
    sX = cx; sY = cy;
    sRow = pos.row; sCol = pos.col;
    isSwiping = true;
    sound.select();
}

function onMove(cx, cy) {
    if (!isSwiping || !gameActive || isProcessing || isGameOver) return;
    const dx = cx - sX, dy = cy - sY;
    if (Math.abs(dx) < 15 && Math.abs(dy) < 15) return;

    let dr = 0, dc = 0;
    if (Math.abs(dx) > Math.abs(dy)) {
        dc = dx > 0 ? 1 : -1;
    } else {
        dr = dy > 0 ? 1 : -1;
    }

    const r1 = sRow, c1 = sCol;
    const r2 = r1 + dr, c2 = c1 + dc;
    if (r2 < 0 || r2 >= SIZE || c2 < 0 || c2 >= SIZE) {
        isSwiping = false;
        return;
    }

    const rect = canvas.getBoundingClientRect();
    const scale = 400 / rect.width;
    const offsetX = (cx - sX) * scale * 0.6;
    const offsetY = (cy - sY) * scale * 0.6;

    swipeAnim = {
        row: r1, col: c1,
        offsetX: offsetX, offsetY: offsetY,
        progress: 0,
        startRow: r1, startCol: c1,
        targetRow: r2, targetCol: c2
    };

    isSwiping = false;
    doSwap(r1, c1, r2, c2);
}

function onUp() {
    isSwiping = false;
}

function doSwap(r1, c1, r2, c2) {
    [grid[r1][c1], grid[r2][c2]] = [grid[r2][c2], grid[r1][c1]];
    const matches = findMatches();
    if (matches.size === 0) {
        [grid[r1][c1], grid[r2][c2]] = [grid[r2][c2], grid[r1][c1]];
        sound.fail();
        swipeAnim = {
            row: r1, col: c1,
            offsetX: 0, offsetY: 0,
            progress: 0.9,
            startRow: r1, startCol: c1
        };
        setTimeout(function() { swipeAnim = null; }, 250);
        return;
    }
    sound.swap();
    
    const config = getModeConfig(currentMode);
    if (config.type === 'moves') {
        movesLeft--;
        timerDisplay.textContent = '🎯 ' + movesLeft;
        if (movesLeft <= 0) {
            gameActive = false;
            isGameOver = true;
            timerDisplay.textContent = '🎯 0';
            sound.gameOver();
            endGame();
            return;
        }
    }
    comboCount = 0;
    processAllMatches();
}

// ===== СОБЫТИЯ =====
canvas.addEventListener('mousedown', function(e) { e.preventDefault(); onDown(e.clientX, e.clientY); });
canvas.addEventListener('mousemove', function(e) { if (isSwiping) { e.preventDefault(); onMove(e.clientX, e.clientY); } });
canvas.addEventListener('mouseup', function() { onUp(); });
canvas.addEventListener('mouseleave', function() { onUp(); });

canvas.addEventListener('touchstart', function(e) {
    e.preventDefault();
    const touch = e.touches[0];
    if (touch) onDown(touch.clientX, touch.clientY);
}, { passive: false });

canvas.addEventListener('touchmove', function(e) {
    e.preventDefault();
    const touch = e.touches[0];
    if (touch && isSwiping) onMove(touch.clientX, touch.clientY);
}, { passive: false });

canvas.addEventListener('touchend', function(e) {
    e.preventDefault();
    onUp();
}, { passive: false });

canvas.addEventListener('touchcancel', function(e) {
    e.preventDefault();
    onUp();
}, { passive: false });

// ============================================================
// 5. УПРАВЛЕНИЕ
// ============================================================

// ЗВУК
soundToggle.addEventListener('click', function() {
    sound.init();
    const enabled = sound.toggle();
    soundToggle.textContent = enabled ? '🔊' : '🔇';
    soundToggle.classList.toggle('muted', !enabled);
});

// ИГРАТЬ
document.getElementById('playBtn').addEventListener('click', function() {
    const nick = nickInput.value.trim();
    if (!nick) {
        alert('Введи свой никнейм!');
        return;
    }
    currentNickname = nick;
    localStorage.setItem('game_nickname', nick);
    
    currentMode = selectedMode;
    const config = getModeConfig(currentMode);
    modeLabel.textContent = config.label;
    sound.init();
    hideMenu();
    restartGame();
});

// Сброс
function restartGame() {
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = null;
    gameActive = false;
    isProcessing = false;
    isGameOver = false;
    dropAnims = [];
    popAnims = [];
    sparkles = [];
    comboCount = 0;
    swipeAnim = null;
    initGrid();
    score = 0;
    scoreDisplay.textContent = '0';
    startTimer();
}
document.getElementById('restartBtn').addEventListener('click', restartGame);
document.getElementById('restartBtn').addEventListener('touchstart', function(e) {
    e.preventDefault();
    restartGame();
}, { passive: false });

// Меню (домой)
document.getElementById('homeBtn').addEventListener('click', function() {
    if (gameActive || score > 0) {
        if (!confirm('Выйти в меню? Прогресс будет потерян.')) return;
    }
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = null;
    gameActive = false;
    isGameOver = true;
    showMenu();
});
document.getElementById('homeBtn').addEventListener('touchstart', function(e) {
    e.preventDefault();
    document.getElementById('homeBtn').click();
}, { passive: false });

// Рекорды (локальные)
document.getElementById('menuRecordsBtn').addEventListener('click', function() {
    currentTabMode = selectedMode;
    tabBtns.forEach(b => {
        b.classList.toggle('active', b.dataset.tab === currentTabMode);
    });
    updateRecordsUI(currentTabMode, 'local');
    document.getElementById('modal').classList.add('open');
});
document.getElementById('footerRecordsBtn').addEventListener('click', function() {
    currentTabMode = currentMode;
    tabBtns.forEach(b => {
        b.classList.toggle('active', b.dataset.tab === currentTabMode);
    });
    updateRecordsUI(currentTabMode, 'local');
    document.getElementById('modal').classList.add('open');
});

// Таблица лидеров (онлайн)
document.getElementById('menuOnlineBtn').addEventListener('click', function() {
    if (!onlineEnabled) {
        alert('❌ Онлайн режим недоступен. Проверь подключение к интернету.');
        return;
    }
    currentTabMode = selectedMode;
    tabBtns.forEach(b => {
        b.classList.toggle('active', b.dataset.tab === currentTabMode);
    });
    updateRecordsUI(currentTabMode, 'online');
    document.getElementById('modal').classList.add('open');
});
document.getElementById('footerOnlineBtn').addEventListener('click', function() {
    if (!onlineEnabled) {
        alert('❌ Онлайн режим недоступен. Проверь подключение к интернету.');
        return;
    }
    currentTabMode = currentMode;
    tabBtns.forEach(b => {
        b.classList.toggle('active', b.dataset.tab === currentTabMode);
    });
    updateRecordsUI(currentTabMode, 'online');
    document.getElementById('modal').classList.add('open');
});

document.getElementById('modalCloseBtn').addEventListener('click', function() {
    document.getElementById('modal').classList.remove('open');
});
document.getElementById('modal').addEventListener('click', function(e) {
    if (e.target === e.currentTarget) {
        document.getElementById('modal').classList.remove('open');
    }
});

// ============================================================
// 6. СТАРТ
// ============================================================
async function init() {
    // Проверяем подключение к серверу
    await checkConnection();
    
    // Если онлайн включён, загружаем бейджи
    if (onlineEnabled) {
        await updateOnlineBadges();
    }
    
    // Загружаем сохранённый ник
    const savedNick = localStorage.getItem('game_nickname');
    if (savedNick) {
        nickInput.value = savedNick;
        currentNickname = savedNick;
    }
    
    initGrid();
    showMenu();
    updateMenuBestScores();
    draw();
    gameActive = false;
    isGameOver = true;
    
    console.log('✨ 3 в ряд — Вариант Б (онлайн таблица лидеров)');
    console.log('🌐 Статус:', onlineEnabled ? 'Онлайн' : 'Офлайн');
    console.log('📊 Рекорды сохраняются локально и в Google Sheets');
}

init();
</script>
