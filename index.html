<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>✨ 3 в ряд — Премиум</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a1a;
            overflow: hidden;
            touch-action: none;
        }

        .app {
            position: relative;
            width: 100%;
            max-width: 430px;
            height: 100vh;
            max-height: 860px;
            background: linear-gradient(145deg, #141429, #1a1a3e);
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 25px 80px rgba(0,0,0,0.9), 0 0 0 1px rgba(255,255,255,0.04);
            display: flex;
            flex-direction: column;
        }

        /* ===== МЕНЮ (стартовый экран) ===== */
        .menu-screen {
            position: absolute;
            inset: 0;
            z-index: 50;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(ellipse at 50% 30%, #1a2a5e, #0a0a1a);
            padding: 30px;
            transition: opacity 0.6s ease, transform 0.6s ease;
            border-radius: 32px;
        }
        .menu-screen.hidden {
            opacity: 0;
            transform: scale(1.05);
            pointer-events: none;
        }
        .menu-screen .logo {
            font-size: 52px;
            font-weight: 900;
            background: linear-gradient(135deg, #f1c40f, #e94560, #f1c40f);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradMove 3s ease infinite;
            letter-spacing: -2px;
            margin-bottom: 6px;
        }
        @keyframes gradMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .menu-screen .subtitle {
            color: rgba(255,255,255,0.3);
            font-size: 14px;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-bottom: 30px;
        }
        .menu-screen .menu-btn {
            background: linear-gradient(135deg, #e94560, #c73652);
            border: none;
            color: #fff;
            padding: 16px 56px;
            border-radius: 50px;
            font-size: 22px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
            box-shadow: 0 8px 30px rgba(233,69,96,0.35);
            touch-action: manipulation;
            letter-spacing: 1px;
        }
        .menu-screen .menu-btn:active {
            transform: scale(0.92);
        }
        .menu-screen .menu-footer {
            display: flex;
            gap: 30px;
            margin-top: 24px;
            color: rgba(255,255,255,0.25);
            font-size: 14px;
        }
        .menu-screen .menu-footer span {
            cursor: pointer;
            transition: all 0.3s;
            padding: 4px 12px;
            border-radius: 20px;
            background: rgba(255,255,255,0.03);
        }
        .menu-screen .menu-footer span:active {
            transform: scale(0.9);
            color: #fff;
            background: rgba(255,255,255,0.08);
        }
        .menu-screen .version {
            position: absolute;
            bottom: 18px;
            color: rgba(255,255,255,0.08);
            font-size: 11px;
            letter-spacing: 2px;
        }

        /* ===== ХЕДЕР ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 22px 10px 22px;
            color: #fff;
            flex-shrink: 0;
            background: linear-gradient(180deg, rgba(20,20,41,0.95) 0%, transparent 100%);
            z-index: 10;
            transition: opacity 0.3s;
        }
        .header .logo-small {
            font-size: 18px;
            font-weight: 800;
            background: linear-gradient(135deg, #f1c40f, #e94560);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }
        .header .right {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header .score-badge {
            background: rgba(255,255,255,0.07);
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 15px;
            font-weight: 700;
            color: #fff;
            border: 1px solid rgba(255,255,255,0.06);
            backdrop-filter: blur(10px);
        }
        .header .score-badge span {
            color: #f1c40f;
            font-size: 17px;
        }
        .header .timer-badge {
            background: rgba(255,255,255,0.07);
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            border: 1px solid rgba(255,255,255,0.06);
            backdrop-filter: blur(10px);
            min-width: 54px;
            text-align: center;
            transition: all 0.3s;
        }
        .timer-badge.warning {
            color: #e94560;
            animation: pulse 0.6s infinite alternate;
        }
        @keyframes pulse {
            from { opacity: 1; transform: scale(1); }
            to { opacity: 0.5; transform: scale(1.05); }
        }
        .header .sound-btn {
            background: rgba(255,255,255,0.07);
            border: none;
            color: #fff;
            font-size: 17px;
            padding: 4px 10px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            touch-action: manipulation;
            border: 1px solid rgba(255,255,255,0.06);
            line-height: 1.4;
        }
        .header .sound-btn:active {
            transform: scale(0.85);
        }
        .header .sound-btn.muted {
            opacity: 0.3;
        }

        /* ===== КАНВАС ===== */
        .canvas-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 6px 16px 6px 16px;
            min-height: 0;
        }
        canvas {
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 20px;
            background: #0f1a2e;
            box-shadow: 
                inset 0 0 60px rgba(0,0,0,0.5),
                0 8px 40px rgba(0,0,0,0.6);
            touch-action: none;
            cursor: grab;
            max-width: 400px;
            max-height: 400px;
        }
        canvas:active {
            cursor: grabbing;
        }

        /* ===== ФУТЕР ===== */
        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 22px 18px 22px;
            flex-shrink: 0;
            gap: 10px;
            background: linear-gradient(0deg, rgba(20,20,41,0.95) 0%, transparent 100%);
        }
        .footer button {
            background: rgba(255,255,255,0.06);
            border: none;
            color: rgba(255,255,255,0.6);
            padding: 10px 16px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.22, 1, 0.36, 1);
            touch-action: manipulation;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.04);
            flex: 1;
            text-align: center;
        }
        .footer button:active {
            transform: scale(0.92);
            background: rgba(255,255,255,0.12);
        }
        .footer .btn-primary {
            background: linear-gradient(135deg, #e94560, #c73652);
            color: #fff;
            border: none;
            box-shadow: 0 4px 20px rgba(233,69,96,0.3);
            flex: 1.2;
        }
        .footer .btn-primary:active {
            transform: scale(0.92);
            box-shadow: 0 2px 10px rgba(233,69,96,0.2);
        }
        .footer .btn-icon {
            flex: 0.4;
            font-size: 19px;
            padding: 10px 0;
        }

        /* ===== МОДАЛ РЕКОРДОВ (50 записей) ===== */
        .modal-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(20px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            padding: 20px;
            animation: fadeIn 0.3s ease;
            border-radius: 32px;
        }
        .modal-overlay.open {
            display: flex;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .modal {
            background: linear-gradient(160deg, #1e1e42, #141429);
            border-radius: 28px;
            padding: 24px 20px 20px 20px;
            max-width: 380px;
            width: 100%;
            max-height: 80vh;
            border: 1px solid rgba(255,255,255,0.06);
            box-shadow: 0 30px 80px rgba(0,0,0,0.8);
            animation: slideUp 0.4s cubic-bezier(0.22, 1, 0.36, 1);
            display: flex;
            flex-direction: column;
        }
        @keyframes slideUp {
            from { transform: translateY(40px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .modal h2 {
            color: #fff;
            font-size: 22px;
            text-align: center;
            margin-bottom: 2px;
        }
        .modal .sub {
            color: rgba(255,255,255,0.25);
            text-align: center;
            font-size: 13px;
            margin-bottom: 14px;
        }
        .modal .records-scroll {
            overflow-y: auto;
            flex: 1;
            max-height: 50vh;
            padding-right: 4px;
        }
        .modal .records-scroll::-webkit-scrollbar {
            width: 3px;
        }
        .modal .records-scroll::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
        }
        .modal .records-scroll::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.15);
            border-radius: 10px;
        }
        .modal .record-item {
            display: flex;
            justify-content: space-between;
            padding: 7px 4px;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            color: rgba(255,255,255,0.6);
            font-size: 15px;
        }
        .modal .record-item:last-child { border-bottom: none; }
        .modal .record-item .rank {
            font-weight: 600;
            width: 34px;
            color: rgba(255,255,255,0.2);
            text-align: left;
        }
        .modal .record-item .rank.gold { color: #ffd700; }
        .modal .record-item .rank.silver { color: #c0c0c0; }
        .modal .record-item .rank.bronze { color: #cd7f32; }
        .modal .record-item .name {
            flex: 1;
            text-align: left;
            padding-left: 4px;
            color: rgba(255,255,255,0.5);
            font-size: 13px;
        }
        .modal .record-item .val {
            font-weight: 700;
            color: #fff;
            font-size: 15px;
        }
        .modal .record-empty {
            color: rgba(255,255,255,0.15);
            text-align: center;
            padding: 30px 0;
            font-size: 14px;
        }
        .modal .close-btn {
            width: 100%;
            margin-top: 14px;
            padding: 13px;
            background: rgba(255,255,255,0.06);
            border: none;
            border-radius: 30px;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            touch-action: manipulation;
            flex-shrink: 0;
        }
        .modal .close-btn:active {
            transform: scale(0.94);
            background: rgba(255,255,255,0.12);
        }

        /* ===== АДАПТАЦИЯ ===== */
        @media (max-width: 440px) {
            .app { border-radius: 0; max-height: 100vh; }
            .menu-screen { border-radius: 0; }
            .modal-overlay { border-radius: 0; }
            .header { padding: 14px 16px 6px 16px; }
            .header .logo-small { font-size: 15px; }
            .header .score-badge { font-size: 13px; padding: 4px 10px; }
            .header .timer-badge { font-size: 12px; padding: 4px 8px; min-width: 44px; }
            .header .sound-btn { font-size: 15px; padding: 2px 8px; }
            .footer { padding: 8px 14px 14px 14px; gap: 8px; }
            .footer button { font-size: 12px; padding: 8px 12px; }
            .canvas-wrapper { padding: 4px 10px; }
            .menu-screen .logo { font-size: 38px; }
            .menu-screen .menu-btn { padding: 14px 40px; font-size: 18px; }
            .modal { padding: 18px 14px 16px 14px; max-width: 340px; }
            .modal h2 { font-size: 19px; }
            .modal .record-item { font-size: 13px; padding: 5px 2px; }
        }
        @media (max-height: 700px) {
            .header { padding: 10px 16px 4px 16px; }
            .header .logo-small { font-size: 14px; }
            .footer { padding: 6px 14px 10px 14px; }
            .footer button { font-size: 11px; padding: 6px 10px; }
            .canvas-wrapper { padding: 2px 10px; }
            .menu-screen .logo { font-size: 32px; }
            .menu-screen .menu-btn { padding: 12px 36px; font-size: 16px; }
        }
    </style>
</head>
<body>

<div class="app" id="app">

    <!-- ===== МЕНЮ (СТАРТОВЫЙ ЭКРАН) ===== -->
    <div class="menu-screen" id="menuScreen">
        <div class="logo">✦ 3 в ряд</div>
        <div class="subtitle">премиум</div>
        <button class="menu-btn" id="menuPlayBtn">▶ ИГРАТЬ</button>
        <div class="menu-footer">
            <span id="menuRecordsBtn">🏆 Рекорды</span>
        </div>
        <div class="version">v2.0</div>
    </div>

    <!-- ===== ХЕДЕР ===== -->
    <div class="header" id="gameHeader">
        <div class="logo-small">✦ 3 в ряд</div>
        <div class="right">
            <button class="sound-btn" id="soundToggle">🔊</button>
            <div class="score-badge">🎯 <span id="scoreDisplay">0</span></div>
            <div class="timer-badge" id="timerDisplay">⏱ 60</div>
        </div>
    </div>

    <!-- ===== ИГРОВОЕ ПОЛЕ ===== -->
    <div class="canvas-wrapper">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
    </div>

    <!-- ===== ФУТЕР ===== -->
    <div class="footer">
        <button class="btn-icon" id="footerRecordsBtn">🏆</button>
        <button id="restartBtn">🔄 Сброс</button>
        <button class="btn-primary" id="homeBtn">🏠 Меню</button>
    </div>

    <!-- ===== МОДАЛ РЕКОРДОВ (50 записей) ===== -->
    <div class="modal-overlay" id="recordsModal">
        <div class="modal">
            <h2>🏆 Рекорды</h2>
            <div class="sub">50 лучших результатов</div>
            <div class="records-scroll" id="recordsListContainer">
                <!-- заполняется JS -->
            </div>
            <button class="close-btn" id="recordsCloseBtn">✕ Закрыть</button>
        </div>
    </div>
</div>

<script>
// ============================================================
// 0. ЗВУКОВАЯ СИСТЕМА
// ============================================================
class SoundEngine {
    constructor() {
        this.ctx = null;
        this.enabled = true;
        this.initialized = false;
    }
    init() {
        if (this.initialized) return;
        try {
            this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            this.initialized = true;
        } catch (e) { /* тихо */ }
    }
    toggle() {
        this.enabled = !this.enabled;
        return this.enabled;
    }
    play(freq, dur, type = 'sine', vol = 0.3) {
        if (!this.enabled || !this.initialized) return;
        try {
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
            gain.gain.setValueAtTime(vol, this.ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + dur);
            osc.connect(gain);
            gain.connect(this.ctx.destination);
            osc.start();
            osc.stop(this.ctx.currentTime + dur);
        } catch (e) { /* тихо */ }
    }
    select() { this.play(600, 0.08, 'sine', 0.15); }
    swap() { this.play(800, 0.1, 'sine', 0.2); setTimeout(() => this.play(1000, 0.08, 'sine', 0.15), 80); }
    match() { this.play(523, 0.12, 'sine', 0.25); setTimeout(() => this.play(659, 0.12, 'sine', 0.2), 100); setTimeout(() => this.play(784, 0.15, 'sine', 0.2), 200); }
    combo() { for (let i=0;i<3;i++) { setTimeout(()=>{ this.play(523+i*80,0.1,'square',0.12); }, i*70); } setTimeout(()=>this.play(880,0.2,'sine',0.25),210); }
    fail() { this.play(300,0.25,'sawtooth',0.15); setTimeout(()=>this.play(250,0.3,'sawtooth',0.12),150); }
    gameOver() { this.play(440,0.15,'sine',0.2); setTimeout(()=>this.play(350,0.2,'sine',0.2),150); setTimeout(()=>this.play(280,0.4,'sine',0.25),300); }
    record() { for (let i=0;i<5;i++) { setTimeout(()=>{ this.play(523+i*100,0.12,'sine',0.2); }, i*100); } setTimeout(()=>this.play(880,0.3,'sine',0.3),500); }
}
const sound = new SoundEngine();

// ============================================================
// 1. ИГРОВАЯ ЛОГИКА
// ============================================================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreDisplay = document.getElementById('scoreDisplay');
const timerDisplay = document.getElementById('timerDisplay');

const SIZE = 8;
const TILE = 400 / SIZE;
const EMOJIS = ['🍎', '⭐', '🍒', '💎', '🍉'];
const GAME_DURATION = 60;

let grid = [];
let score = 0;
let timer = GAME_DURATION;
let gameActive = false;
let timerInterval = null;
let isProcessing = false;
let dropAnims = [];
let popAnims = [];
let sparkles = [];
let comboCount = 0;
let swipeAnim = null;
let animFrameId = null;

// ===== МЕНЮ =====
const menuScreen = document.getElementById('menuScreen');
const gameHeader = document.getElementById('gameHeader');

function showMenu() {
    menuScreen.classList.remove('hidden');
    gameHeader.style.opacity = '0';
}
function hideMenu() {
    menuScreen.classList.add('hidden');
    gameHeader.style.opacity = '1';
}

// ===== ИНИЦИАЛИЗАЦИЯ =====
function initGrid() {
    grid = [];
    for (let r = 0; r < SIZE; r++) {
        grid[r] = [];
        for (let c = 0; c < SIZE; c++) {
            grid[r][c] = Math.floor(Math.random() * EMOJIS.length);
        }
    }
    let attempts = 0;
    while (findMatches().size > 0 && attempts < 100) {
        for (let r = 0; r < SIZE; r++) {
            for (let c = 0; c < SIZE; c++) {
                if (grid[r][c] !== null) grid[r][c] = Math.floor(Math.random() * EMOJIS.length);
            }
        }
        attempts++;
    }
    dropAnims = [];
    for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
            dropAnims.push({ row: r, col: c, progress: 0, delay: (r + c) * 30 + Math.random() * 20 });
        }
    }
    sparkles = [];
    comboCount = 0;
    swipeAnim = null;
}

function findMatches() {
    const matches = new Set();
    for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE - 2; c++) {
            if (grid[r][c] === null) continue;
            if (grid[r][c] === grid[r][c+1] && grid[r][c] === grid[r][c+2]) {
                matches.add(r+','+c); matches.add(r+','+(c+1)); matches.add(r+','+(c+2));
            }
        }
    }
    for (let r = 0; r < SIZE - 2; r++) {
        for (let c = 0; c < SIZE; c++) {
            if (grid[r][c] === null) continue;
            if (grid[r][c] === grid[r+1][c] && grid[r][c] === grid[r+2][c]) {
                matches.add(r+','+c); matches.add((r+1)+','+c); matches.add((r+2)+','+c);
            }
        }
    }
    return matches;
}

function dropDown() {
    let dropped = false;
    const newDrops = [];
    for (let c = 0; c < SIZE; c++) {
        let emptyCount = 0;
        for (let r = SIZE - 1; r >= 0; r--) {
            if (grid[r][c] === null) {
                emptyCount++;
            } else if (emptyCount > 0) {
                grid[r + emptyCount][c] = grid[r][c];
                grid[r][c] = null;
                dropped = true;
                newDrops.push({ row: r + emptyCount, col: c, progress: 0, delay: (r + c) * 20 + Math.random() * 10 });
            }
        }
        for (let r = 0; r < emptyCount; r++) {
            grid[r][c] = Math.floor(Math.random() * EMOJIS.length);
            newDrops.push({ row: r, col: c, progress: 0, delay: (r + c) * 20 + Math.random() * 10 });
            dropped = true;
        }
    }
    for (const d of newDrops) dropAnims.push(d);
    return dropped;
}

function processMatches() {
    const matches = findMatches();
    if (matches.size === 0) return false;

    comboCount++;
    const bonus = comboCount > 1 ? Math.floor(comboCount * 5) : 0;
    const points = matches.size * 10 + bonus;
    score += points;
    scoreDisplay.textContent = score;

    if (comboCount > 2) sound.combo();
    else sound.match();

    for (const pos of matches) {
        const [r, c] = pos.split(',').map(Number);
        popAnims.push({ row: r, col: c, progress: 0 });
        for (let i = 0; i < 5; i++) {
            sparkles.push({
                x: c * TILE + TILE/2,
                y: r * TILE + TILE/2,
                vx: (Math.random() - 0.5) * 6,
                vy: (Math.random() - 0.5) * 6 - 2,
                life: 1,
                size: 3 + Math.random() * 4,
                color: ['#ffd700', '#e94560', '#f1c40f', '#2ecc71', '#3498db'][Math.floor(Math.random() * 5)]
            });
        }
    }

    for (const pos of matches) {
        const [r, c] = pos.split(',').map(Number);
        grid[r][c] = null;
    }
    dropDown();
    return true;
}

function processAllMatches() {
    if (isProcessing) return;
    isProcessing = true;
    let iter = 0;
    function step() {
        if (iter > 20) { isProcessing = false; return; }
        if (!processMatches()) {
            isProcessing = false;
            if (!hasValidMoves()) {
                setTimeout(shuffleGrid, 300);
            }
            return;
        }
        iter++;
        setTimeout(step, 250);
    }
    step();
}

function hasValidMoves() {
    for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
            if (c < SIZE - 1) {
                [grid[r][c], grid[r][c+1]] = [grid[r][c+1], grid[r][c]];
                if (findMatches().size > 0) {
                    [grid[r][c], grid[r][c+1]] = [grid[r][c+1], grid[r][c]];
                    return true;
                }
                [grid[r][c], grid[r][c+1]] = [grid[r][c+1], grid[r][c]];
            }
            if (r < SIZE - 1) {
                [grid[r][c], grid[r+1][c]] = [grid[r+1][c], grid[r][c]];
                if (findMatches().size > 0) {
                    [grid[r][c], grid[r+1][c]] = [grid[r+1][c], grid[r][c]];
                    return true;
                }
                [grid[r][c], grid[r+1][c]] = [grid[r+1][c], grid[r][c]];
            }
        }
    }
    return false;
}

function shuffleGrid() {
    const flat = [];
    for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
            flat.push(grid[r][c]);
        }
    }
    for (let i = flat.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [flat[i], flat[j]] = [flat[j], flat[i]];
    }
    let idx = 0;
    for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
            grid[r][c] = flat[idx++];
        }
    }
    processAllMatches();
}

// ===== ОТРИСОВКА =====
function draw() {
    ctx.clearRect(0, 0, 400, 400);

    for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
            const x = c * TILE, y = r * TILE;
            ctx.fillStyle = (r + c) % 2 === 0 ? '#1a2a4a' : '#12203a';
            ctx.fillRect(x, y, TILE - 1, TILE - 1);
        }
    }

    for (const a of dropAnims) a.progress = Math.min(a.progress + 0.05, 1);
    dropAnims = dropAnims.filter(a => a.progress < 1);
    for (const a of popAnims) a.progress += 0.08;
    popAnims = popAnims.filter(a => a.progress < 1);

    for (const s of sparkles) {
        s.x += s.vx;
        s.y += s.vy;
        s.vy += 0.1;
        s.life -= 0.025;
    }
    sparkles = sparkles.filter(s => s.life > 0);

    const tiles = [];
    for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
            if (grid[r][c] === null) continue;
            tiles.push({ row: r, col: c, value: grid[r][c] });
        }
    }

    if (swipeAnim && swipeAnim.progress < 1) {
        swipeAnim.progress += 0.06;
        const ease = 1 - Math.pow(1 - swipeAnim.progress, 3);
        const offsetX = swipeAnim.offsetX * ease;
        const offsetY = swipeAnim.offsetY * ease;
        const val = grid[swipeAnim.row]?.[swipeAnim.col];
        if (val !== undefined && val !== null) {
            tiles.push({
                row: swipeAnim.row,
                col: swipeAnim.col,
                value: val,
                offsetX: offsetX,
                offsetY: offsetY,
                scale: 1 - 0.05 * ease,
                isSwiping: true
            });
        }
        if (swipeAnim.progress >= 1) {
            swipeAnim = null;
        }
    }

    for (const tile of tiles) {
        if (tile.value === undefined || tile.value === null) continue;

        const x = tile.col * TILE + TILE/2 + (tile.offsetX || 0);
        let y = tile.row * TILE + TILE/2 + (tile.offsetY || 0);
        let scale = tile.scale || 1;
        let opacity = 1;
        let rotation = 0;

        if (!tile.isSwiping) {
            const drop = dropAnims.find(a => a.row === tile.row && a.col === tile.col);
            if (drop) {
                const ease = 1 - Math.pow(1 - drop.progress, 3) * Math.cos(drop.progress * Math.PI * 0.3);
                y += (drop.row - tile.row) * TILE * (1 - ease) * 0.9;
                scale = 0.3 + 0.7 * ease;
                rotation = (1 - ease) * 0.05;
            }
        }

        const pop = popAnims.find(a => a.row === tile.row && a.col === tile.col);
        if (pop) {
            scale = 1 + pop.progress * 2.8;
            opacity = 1 - pop.progress;
            rotation = pop.progress * 0.3;
        }

        ctx.save();
        ctx.globalAlpha = opacity;
        ctx.translate(x, y);
        ctx.rotate(rotation);
        ctx.scale(scale, scale);

        const radius = TILE * 0.42;
        const grad = ctx.createRadialGradient(-radius*0.25, -radius*0.25, 0, 0, 0, radius);
        grad.addColorStop(0, 'rgba(255,255,255,0.2)');
        grad.addColorStop(0.5, 'rgba(255,255,255,0.03)');
        grad.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(0, 0, radius, 0, Math.PI*2);
        ctx.fill();

        ctx.font = (TILE - 8) + 'px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.shadowColor = 'rgba(0,0,0,0.5)';
        ctx.shadowBlur = 12;
        ctx.shadowOffsetY = 2;
        ctx.fillStyle = '#fff';
        ctx.fillText(EMOJIS[tile.value], 0, 2);
        ctx.shadowBlur = 0;

        ctx.restore();
    }

    for (const s of sparkles) {
        ctx.save();
        ctx.globalAlpha = s.life;
        ctx.fillStyle = s.color;
        ctx.shadowColor = s.color;
        ctx.shadowBlur = 10;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.size * s.life, 0, Math.PI*2);
        ctx.fill();
        ctx.restore();
    }

    if (swipeAnim && swipeAnim.progress < 0.8) {
        const alpha = 0.3 * (1 - swipeAnim.progress);
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.strokeStyle = '#f1c40f';
        ctx.lineWidth = 3;
        ctx.setLineDash([5, 8]);
        ctx.shadowColor = '#f1c40f';
        ctx.shadowBlur = 15;
        const startX = swipeAnim.startCol * TILE + TILE/2;
        const startY = swipeAnim.startRow * TILE + TILE/2;
        const endX = swipeAnim.col * TILE + TILE/2 + swipeAnim.offsetX * 0.5;
        const endY = swipeAnim.row * TILE + TILE/2 + swipeAnim.offsetY * 0.5;
        ctx.beginPath();
        ctx.moveTo(startX, startY);
        ctx.lineTo(endX, endY);
        ctx.stroke();
        ctx.restore();
    }

    animFrameId = requestAnimationFrame(draw);
}

// ===== ТАЙМЕР =====
function startTimer() {
    if (timerInterval) clearInterval(timerInterval);
    timer = GAME_DURATION;
    timerDisplay.textContent = '⏱ ' + timer;
    timerDisplay.className = 'timer-badge';
    gameActive = true;
    timerInterval = setInterval(() => {
        timer--;
        timerDisplay.textContent = '⏱ ' + timer;
        if (timer <= 10) timerDisplay.className = 'timer-badge warning';
        if (timer <= 0) {
            clearInterval(timerInterval);
            timerInterval = null;
            gameActive = false;
            timerDisplay.textContent = '⏱ 0';
            sound.gameOver();
            const isNew = saveRecord(score);
            updateRecordsUI();
            if (isNew) {
                sound.record();
                setTimeout(() => alert('🎉 НОВЫЙ РЕКОРД! ' + score), 300);
            } else {
                setTimeout(() => alert('⏰ Время вышло!\nСчёт: ' + score), 200);
            }
        }
    }, 1000);
}

// ===== РЕКОРДЫ (50 записей) =====
function getRecords() {
    try {
        return JSON.parse(localStorage.getItem('match3_records_v2')) || [];
    } catch { return []; }
}

function saveRecord(scoreVal) {
    const records = getRecords();
    let isNew = false;
    if (records.length === 0 || scoreVal > records[records.length - 1] || records.length < 50) {
        records.push(scoreVal);
        records.sort((a, b) => b - a);
        if (records.length > 50) records.length = 50;
        localStorage.setItem('match3_records_v2', JSON.stringify(records));
        isNew = records[0] === scoreVal && records.indexOf(scoreVal) === 0;
    }
    return isNew;
}

function updateRecordsUI() {
    const records = getRecords();
    const container = document.getElementById('recordsListContainer');
    const medals = ['🥇', '🥈', '🥉'];
    if (records.length === 0) {
        container.innerHTML = '<div class="record-empty">Пока нет рекордов<br>Сыграй и установи свой!</div>';
        return;
    }
    let html = '';
    records.forEach((val, i) => {
        const rank = i < 3 ? medals[i] : `${i+1}.`;
        const rankClass = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
        html += `
            <div class="record-item">
                <span class="rank ${rankClass}">${rank}</span>
                <span class="name">Игрок</span>
                <span class="val">${val}</span>
            </div>
        `;
    });
    container.innerHTML = html;
}

// ============================================================
// 2. СВАЙП
// ============================================================
function getGridPos(clientX, clientY) {
    const rect = canvas.getBoundingClientRect();
    const scale = 400 / rect.width;
    const x = (clientX - rect.left) * scale;
    const y = (clientY - rect.top) * scale;
    if (x < 0 || y < 0 || x > 400 || y > 400) return null;
    return { row: Math.floor(y / TILE), col: Math.floor(x / TILE) };
}

let swipeStartX = 0, swipeStartY = 0;
let swipeStartRow = -1, swipeStartCol = -1;
let isSwiping = false;

function onPointerDown(clientX, clientY) {
    if (!gameActive || isProcessing) return;
    sound.init();
    const pos = getGridPos(clientX, clientY);
    if (!pos || pos.row >= SIZE || pos.col >= SIZE) return;
    swipeStartX = clientX;
    swipeStartY = clientY;
    swipeStartRow = pos.row;
    swipeStartCol = pos.col;
    isSwiping = true;
    sound.select();
}

function onPointerMove(clientX, clientY) {
    if (!isSwiping || !gameActive || isProcessing) return;
    const dx = clientX - swipeStartX;
    const dy = clientY - swipeStartY;
    if (Math.abs(dx) < 15 && Math.abs(dy) < 15) return;

    let dr = 0, dc = 0;
    if (Math.abs(dx) > Math.abs(dy)) {
        dc = dx > 0 ? 1 : -1;
    } else {
        dr = dy > 0 ? 1 : -1;
    }

    const r1 = swipeStartRow, c1 = swipeStartCol;
    const r2 = r1 + dr, c2 = c1 + dc;
    if (r2 < 0 || r2 >= SIZE || c2 < 0 || c2 >= SIZE) {
        isSwiping = false;
        return;
    }

    const rect = canvas.getBoundingClientRect();
    const scale = 400 / rect.width;
    const offsetX = (clientX - swipeStartX) * scale * 0.6;
    const offsetY = (clientY - swipeStartY) * scale * 0.6;

    swipeAnim = {
        row: r1,
        col: c1,
        offsetX: offsetX,
        offsetY: offsetY,
        progress: 0,
        startRow: r1,
        startCol: c1,
        targetRow: r2,
        targetCol: c2
    };

    isSwiping = false;
    performSwap(r1, c1, r2, c2);
}

function onPointerUp() {
    isSwiping = false;
}

function performSwap(r1, c1, r2, c2) {
    [grid[r1][c1], grid[r2][c2]] = [grid[r2][c2], grid[r1][c1]];
    const matches = findMatches();
    if (matches.size === 0) {
        [grid[r1][c1], grid[r2][c2]] = [grid[r2][c2], grid[r1][c1]];
        sound.fail();
        swipeAnim = {
            row: r1,
            col: c1,
            offsetX: 0,
            offsetY: 0,
            progress: 0.9,
            startRow: r1,
            startCol: c1
        };
        setTimeout(() => { swipeAnim = null; }, 250);
        return;
    }
    sound.swap();
    comboCount = 0;
    processAllMatches();
}

// ===== СОБЫТИЯ =====
canvas.addEventListener('mousedown', (e) => {
    e.preventDefault();
    onPointerDown(e.clientX, e.clientY);
});
canvas.addEventListener('mousemove', (e) => {
    if (isSwiping) {
        e.preventDefault();
        onPointerMove(e.clientX, e.clientY);
    }
});
canvas.addEventListener('mouseup', () => { onPointerUp(); });
canvas.addEventListener('mouseleave', () => { onPointerUp(); });

canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    const touch = e.touches[0];
    if (touch) onPointerDown(touch.clientX, touch.clientY);
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    const touch = e.touches[0];
    if (touch && isSwiping) {
        onPointerMove(touch.clientX, touch.clientY);
    }
}, { passive: false });

canvas.addEventListener('touchend', (e) => {
    e.preventDefault();
    onPointerUp();
}, { passive: false });
canvas.addEventListener('touchcancel', (e) => {
    e.preventDefault();
    onPointerUp();
}, { passive: false });

// ============================================================
// 3. УПРАВЛЕНИЕ
// ============================================================
// Звук
const soundToggle = document.getElementById('soundToggle');
soundToggle.addEventListener('click', () => {
    sound.init();
    const enabled = sound.toggle();
    soundToggle.textContent = enabled ? '🔊' : '🔇';
    soundToggle.classList.toggle('muted', !enabled);
});

// Меню
document.getElementById('menuPlayBtn').addEventListener('click', () => {
    sound.init();
    hideMenu();
    restartGame();
});
document.getElementById('menuRecordsBtn').addEventListener('click', () => {
    sound.init();
    updateRecordsUI();
    document.getElementById('recordsModal').classList.add('open');
});

// Кнопки
function restartGame() {
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = null;
    gameActive = false;
    isProcessing = false;
    dropAnims = [];
    popAnims = [];
    sparkles = [];
    comboCount = 0;
    swipeAnim = null;
    initGrid();
    score = 0;
    scoreDisplay.textContent = '0';
    startTimer();
}

document.getElementById('restartBtn').addEventListener('click', restartGame);
document.getElementById('restartBtn').addEventListener('touchstart', (e) => { e.preventDefault(); restartGame(); }, { passive: false });

document.getElementById('homeBtn').addEventListener('click', () => {
    if (gameActive || score > 0) {
        if (!confirm('Выйти в меню? Прогресс будет потерян.')) return;
    }
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = null;
    gameActive = false;
    showMenu();
});

// Рекорды (футер)
document.getElementById('footerRecordsBtn').addEventListener('click', () => {
    sound.init();
    updateRecordsUI();
    document.getElementById('recordsModal').classList.add('open');
});
document.getElementById('recordsCloseBtn').addEventListener('click', () => {
    document.getElementById('recordsModal').classList.remove('open');
});
document.getElementById('recordsModal').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) {
        document.getElementById('recordsModal').classList.remove('open');
    }
});

// ============================================================
// 4. СТАРТ
// ============================================================
function fullRestart() {
    if (animFrameId) cancelAnimationFrame(animFrameId);
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = null;
    gameActive = false;
    isProcessing = false;
    dropAnims = [];
    popAnims = [];
    sparkles = [];
    comboCount = 0;
    swipeAnim = null;
    initGrid();
    score = 0;
    scoreDisplay.textContent = '0';
    updateRecordsUI();
    startTimer();
    draw();
}

// Первый запуск
initGrid();
updateRecordsUI();
showMenu();
draw();
gameActive = false;

console.log('✨ 3 в ряд — Финальная версия');
console.log('🏆 50 рекордов в списке лидеров');
console.log('🎮 Полноценное меню со стартовым экраном');
console.log('🔊 Звуки: клик, свап, матч, комбо, рекорд, гейм-овер');
</script>
