<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>✨ 3 в ряд</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a1a;
            overflow: hidden;
            touch-action: none;
        }
        .app {
            position: relative;
            width: 100%;
            max-width: 430px;
            height: 100vh;
            max-height: 860px;
            background: linear-gradient(145deg, #141429, #1a1a3e);
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 25px 80px rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
        }
        /* ===== МЕНЮ ===== */
        .menu-screen {
            position: absolute;
            inset: 0;
            z-index: 50;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(ellipse at 50% 30%, #1a2a5e, #0a0a1a);
            padding: 30px;
            transition: opacity 0.6s ease, transform 0.6s ease;
            border-radius: 32px;
        }
        .menu-screen.hidden {
            opacity: 0;
            transform: scale(1.05);
            pointer-events: none;
        }
        .menu-screen .logo {
            font-size: 48px;
            font-weight: 900;
            background: linear-gradient(135deg, #f1c40f, #e94560);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -2px;
        }
        .menu-screen .subtitle {
            color: rgba(255,255,255,0.3);
            font-size: 13px;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin: 4px 0 24px 0;
        }
        .menu-screen .menu-btn {
            background: linear-gradient(135deg, #e94560, #c73652);
            border: none;
            color: #fff;
            padding: 16px 50px;
            border-radius: 50px;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 8px 30px rgba(233,69,96,0.35);
            touch-action: manipulation;
            width: 80%;
            max-width: 280px;
        }
        .menu-screen .menu-btn:active { transform: scale(0.92); }
        .menu-screen .menu-footer {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            color: rgba(255,255,255,0.2);
            font-size: 13px;
        }
        .menu-screen .menu-footer span {
            cursor: pointer;
            padding: 4px 12px;
            border-radius: 20px;
            background: rgba(255,255,255,0.03);
        }
        .menu-screen .menu-footer span:active {
            transform: scale(0.9);
            color: #fff;
            background: rgba(255,255,255,0.08);
        }
        .menu-screen .nickname-input {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px;
            padding: 12px 20px;
            color: #fff;
            font-size: 16px;
            width: 80%;
            max-width: 280px;
            text-align: center;
            outline: none;
            margin-bottom: 14px;
        }
        .menu-screen .nickname-input::placeholder {
            color: rgba(255,255,255,0.25);
        }
        .menu-screen .nickname-input:focus {
            border-color: #e94560;
        }

        /* ===== ХЕДЕР ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px 8px 20px;
            color: #fff;
            flex-shrink: 0;
            background: linear-gradient(180deg, rgba(20,20,41,0.95) 0%, transparent 100%);
            z-index: 10;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .header.visible {
            opacity: 1;
        }
        .header .logo-small {
            font-size: 16px;
            font-weight: 800;
            background: linear-gradient(135deg, #f1c40f, #e94560);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header .right {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .header .score-badge {
            background: rgba(255,255,255,0.07);
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 700;
            color: #fff;
            border: 1px solid rgba(255,255,255,0.06);
        }
        .header .score-badge span { color: #f1c40f; }
        .header .timer-badge {
            background: rgba(255,255,255,0.07);
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
            color: #fff;
            border: 1px solid rgba(255,255,255,0.06);
            min-width: 48px;
            text-align: center;
        }
        .timer-badge.warning {
            color: #e94560;
            animation: pulse 0.6s infinite alternate;
        }
        @keyframes pulse {
            from { opacity: 1; transform: scale(1); }
            to { opacity: 0.5; transform: scale(1.05); }
        }
        .header .nickname-badge {
            background: rgba(255,255,255,0.06);
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            border: 1px solid rgba(255,255,255,0.04);
            max-width: 80px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* ===== КАНВАС ===== */
        .canvas-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 4px 12px;
            min-height: 0;
        }
        canvas {
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 16px;
            background: #0f1a2e;
            box-shadow: inset 0 0 60px rgba(0,0,0,0.5), 0 8px 40px rgba(0,0,0,0.6);
            touch-action: none;
            cursor: grab;
            max-width: 400px;
            max-height: 400px;
        }
        canvas:active { cursor: grabbing; }

        /* ===== ФУТЕР ===== */
        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 16px 14px 16px;
            flex-shrink: 0;
            gap: 8px;
            background: linear-gradient(0deg, rgba(20,20,41,0.95) 0%, transparent 100%);
        }
        .footer button {
            background: rgba(255,255,255,0.06);
            border: none;
            color: rgba(255,255,255,0.6);
            padding: 8px 14px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.04);
            flex: 1;
            text-align: center;
        }
        .footer button:active { transform: scale(0.92); background: rgba(255,255,255,0.12); }
        .footer .btn-primary {
            background: linear-gradient(135deg, #e94560, #c73652);
            color: #fff;
            border: none;
            box-shadow: 0 4px 20px rgba(233,69,96,0.3);
            flex: 1.2;
        }

        /* ===== МОДАЛ РЕКОРДОВ ===== */
        .modal-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(20px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            padding: 20px;
            border-radius: 32px;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: linear-gradient(160deg, #1e1e42, #141429);
            border-radius: 28px;
            padding: 24px 20px 20px 20px;
            max-width: 360px;
            width: 100%;
            max-height: 80vh;
            border: 1px solid rgba(255,255,255,0.06);
            box-shadow: 0 30px 80px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
        }
        .modal h2 {
            color: #fff;
            font-size: 22px;
            text-align: center;
        }
        .modal .sub {
            color: rgba(255,255,255,0.25);
            text-align: center;
            font-size: 13px;
            margin-bottom: 12px;
        }
        .modal .records-scroll {
            overflow-y: auto;
            flex: 1;
            max-height: 50vh;
        }
        .modal .records-scroll::-webkit-scrollbar { width: 3px; }
        .modal .records-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 10px; }
        .modal .record-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 4px;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            color: rgba(255,255,255,0.6);
            font-size: 14px;
        }
        .modal .record-item:last-child { border-bottom: none; }
        .modal .record-item .rank {
            font-weight: 600;
            width: 32px;
            color: rgba(255,255,255,0.2);
        }
        .modal .record-item .rank.gold { color: #ffd700; }
        .modal .record-item .rank.silver { color: #c0c0c0; }
        .modal .record-item .rank.bronze { color: #cd7f32; }
        .modal .record-item .val {
            font-weight: 700;
            color: #fff;
        }
        .modal .record-empty {
            color: rgba(255,255,255,0.15);
            text-align: center;
            padding: 20px 0;
            font-size: 13px;
        }
        .modal .close-btn {
            width: 100%;
            margin-top: 12px;
            padding: 12px;
            background: rgba(255,255,255,0.06);
            border: none;
            border-radius: 30px;
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }
        .modal .close-btn:active { transform: scale(0.94); background: rgba(255,255,255,0.12); }

        @media (max-width: 440px) {
            .app { border-radius: 0; max-height: 100vh; }
            .menu-screen { border-radius: 0; }
            .modal-overlay { border-radius: 0; }
            .header { padding: 12px 14px 4px 14px; }
            .header .logo-small { font-size: 14px; }
            .header .score-badge { font-size: 12px; padding: 3px 8px; }
            .header .timer-badge { font-size: 11px; padding: 3px 6px; min-width: 40px; }
            .footer { padding: 6px 12px 10px 12px; }
            .footer button { font-size: 11px; padding: 6px 10px; }
            .canvas-wrapper { padding: 2px 8px; }
            .menu-screen .logo { font-size: 36px; }
            .menu-screen .menu-btn { padding: 14px 30px; font-size: 17px; }
            .menu-screen .nickname-input { font-size: 14px; padding: 10px 16px; }
        }
        @media (max-height: 700px) {
            .header { padding: 8px 14px 2px 14px; }
            .header .logo-small { font-size: 13px; }
            .footer { padding: 4px 12px 8px 12px; }
            .footer button { font-size: 10px; padding: 4px 8px; }
            .canvas-wrapper { padding: 2px 8px; }
            .menu-screen .logo { font-size: 30px; }
            .menu-screen .menu-btn { padding: 10px 24px; font-size: 15px; }
        }
    </style>
</head>
<body>

<div class="app" id="app">

    <!-- ===== МЕНЮ ===== -->
    <div class="menu-screen" id="menuScreen">
        <div class="logo">✦ 3 в ряд</div>
        <div class="subtitle">сохраняй рекорды</div>
        <input class="nickname-input" id="nicknameInput" type="text" placeholder="Введи свой никнейм" maxlength="20">
        <button class="menu-btn" id="menuPlayBtn">▶ ИГРАТЬ</button>
        <div class="menu-footer">
            <span id="menuRecordsBtn">🏆 Рекорды</span>
        </div>
    </div>

    <!-- ===== ХЕДЕР ===== -->
    <div class="header" id="gameHeader">
        <div class="logo-small">✦ 3 в ряд</div>
        <div class="right">
            <div class="nickname-badge" id="nicknameBadge">Гость</div>
            <div class="score-badge">🎯 <span id="scoreDisplay">0</span></div>
            <div class="timer-badge" id="timerDisplay">⏱ 60</div>
        </div>
    </div>

    <!-- ===== ИГРОВОЕ ПОЛЕ ===== -->
    <div class="canvas-wrapper">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
    </div>

    <!-- ===== ФУТЕР ===== -->
    <div class="footer">
        <button id="footerRecordsBtn">🏆</button>
        <button id="restartBtn">🔄 Сброс</button>
        <button class="btn-primary" id="homeBtn">🏠 Меню</button>
    </div>

    <!-- ===== МОДАЛ РЕКОРДОВ ===== -->
    <div class="modal-overlay" id="recordsModal">
        <div class="modal">
            <h2>🏆 Мои рекорды</h2>
            <div class="sub">твои лучшие результаты</div>
            <div class="records-scroll" id="recordsListContainer"></div>
            <button class="close-btn" id="recordsCloseBtn">✕ Закрыть</button>
        </div>
    </div>
</div>

<script>
// ============================================================
// 0. РАБОТА С ЛОКАЛЬНЫМИ РЕКОРДАМИ
// ============================================================
let currentNickname = '';

function getLocalRecords() {
    try {
        const data = localStorage.getItem('game_records');
        return data ? JSON.parse(data) : {};
    } catch { return {}; }
}

function saveLocalRecords(records) {
    localStorage.setItem('game_records', JSON.stringify(records));
}

function addLocalRecord(nickname, score) {
    const records = getLocalRecords();
    if (!records[nickname]) records[nickname] = [];
    records[nickname].push(score);
    records[nickname].sort((a, b) => b - a);
    if (records[nickname].length > 10) records[nickname].length = 10;
    saveLocalRecords(records);
    return records[nickname];
}

function getPlayerRecords(nickname) {
    const records = getLocalRecords();
    return records[nickname] || [];
}

// ============================================================
// 1. ИГРОВАЯ ЛОГИКА
// ============================================================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreDisplay = document.getElementById('scoreDisplay');
const timerDisplay = document.getElementById('timerDisplay');
const nicknameBadge = document.getElementById('nicknameBadge');
const gameHeader = document.getElementById('gameHeader');

const SIZE = 8;
const TILE = 400 / SIZE;
const EMOJIS = ['🍎', '⭐', '🍒', '💎', '🍉'];
const GAME_DURATION = 60;

let grid = [];
let score = 0;
let timer = GAME_DURATION;
let gameActive = false;
let timerInterval = null;
let isProcessing = false;
let dropAnims = [];
let popAnims = [];
let sparkles = [];
let comboCount = 0;
let swipeAnim = null;
let animFrameId = null;

// ===== МЕНЮ =====
const menuScreen = document.getElementById('menuScreen');
const nicknameInput = document.getElementById('nicknameInput');

function showMenu() {
    menuScreen.classList.remove('hidden');
    gameHeader.classList.remove('visible');
}
function hideMenu() {
    menuScreen.classList.add('hidden');
    gameHeader.classList.add('visible');
}

// ===== ИНИЦИАЛИЗАЦИЯ =====
function initGrid() {
    grid = [];
    for (let r = 0; r < SIZE; r++) {
        grid[r] = [];
        for (let c = 0; c < SIZE; c++) {
            grid[r][c] = Math.floor(Math.random() * EMOJIS.length);
        }
    }
    let attempts = 0;
    while (findMatches().size > 0 && attempts < 100) {
        for (let r = 0; r < SIZE; r++) {
            for (let c = 0; c < SIZE; c++) {
                if (grid[r][c] !== null) grid[r][c] = Math.floor(Math.random() * EMOJIS.length);
            }
        }
        attempts++;
    }
    dropAnims = [];
    for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
            dropAnims.push({ row: r, col: c, progress: 0, delay: (r + c) * 30 + Math.random() * 20 });
        }
    }
    sparkles = [];
    comboCount = 0;
    swipeAnim = null;
}

function findMatches() {
    const matches = new Set();
    for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE - 2; c++) {
            if (grid[r][c] === null) continue;
            if (grid[r][c] === grid[r][c+1] && grid[r][c] === grid[r][c+2]) {
                matches.add(r+','+c); matches.add(r+','+(c+1)); matches.add(r+','+(c+2));
            }
        }
    }
    for (let r = 0; r < SIZE - 2; r++) {
        for (let c = 0; c < SIZE; c++) {
            if (grid[r][c] === null) continue;
            if (grid[r][c] === grid[r+1][c] && grid[r][c] === grid[r+2][c]) {
                matches.add(r+','+c); matches.add((r+1)+','+c); matches.add((r+2)+','+c);
            }
        }
    }
    return matches;
}

function dropDown() {
    let dropped = false;
    const newDrops = [];
    for (let c = 0; c < SIZE; c++) {
        let emptyCount = 0;
        for (let r = SIZE - 1; r >= 0; r--) {
            if (grid[r][c] === null) {
                emptyCount++;
            } else if (emptyCount > 0) {
                grid[r + emptyCount][c] = grid[r][c];
                grid[r][c] = null;
                dropped = true;
                newDrops.push({ row: r + emptyCount, col: c, progress: 0, delay: (r + c) * 20 + Math.random() * 10 });
            }
        }
        for (let r = 0; r < emptyCount; r++) {
            grid[r][c] = Math.floor(Math.random() * EMOJIS.length);
            newDrops.push({ row: r, col: c, progress: 0, delay: (r + c) * 20 + Math.random() * 10 });
            dropped = true;
        }
    }
    for (const d of newDrops) dropAnims.push(d);
    return dropped;
}

function processMatches() {
    const matches = findMatches();
    if (matches.size === 0) return false;

    comboCount++;
    const bonus = comboCount > 1 ? Math.floor(comboCount * 5) : 0;
    const points = matches.size * 10 + bonus;
    score += points;
    scoreDisplay.textContent = score;

    for (const pos of matches) {
        const [r, c] = pos.split(',').map(Number);
        popAnims.push({ row: r, col: c, progress: 0 });
        for (let i = 0; i < 5; i++) {
            sparkles.push({
                x: c * TILE + TILE/2,
                y: r * TILE + TILE/2,
                vx: (Math.random() - 0.5) * 6,
                vy: (Math.random() - 0.5) * 6 - 2,
                life: 1,
                size: 3 + Math.random() * 4,
                color: ['#ffd700', '#e94560', '#f1c40f', '#2ecc71', '#3498db'][Math.floor(Math.random() * 5)]
            });
        }
    }

    for (const pos of matches) {
        const [r, c] = pos.split(',').map(Number);
        grid[r][c] = null;
    }
    dropDown();
    return true;
}

function processAllMatches() {
    if (isProcessing) return;
    isProcessing = true;
    let iter = 0;
    function step() {
        if (iter > 20) { isProcessing = false; return; }
        if (!processMatches()) {
            isProcessing = false;
            if (!hasValidMoves()) {
                setTimeout(shuffleGrid, 300);
            }
            return;
        }
        iter++;
        setTimeout(step, 250);
    }
    step();
}

function hasValidMoves() {
    for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
            i
