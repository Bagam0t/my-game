<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3 в ряд</title>
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            background: #1a1a2e; 
            font-family: Arial, sans-serif;
            padding: 10px;
        }
        .game { 
            text-align: center; 
            background: #16213e; 
            padding: 15px; 
            border-radius: 16px; 
            max-width: 400px;
            width: 100%;
        }
        h2 { color: #fff; margin: 0 0 10px; font-size: 22px; }
        canvas { 
            background: #0f3460; 
            border-radius: 12px; 
            cursor: pointer; 
            width: 100%;
            height: auto;
            aspect-ratio: 1/1;
            touch-action: none;
        }
        .info { 
            color: #fff; 
            margin-top: 12px; 
            font-size: 18px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        .info-left { display: flex; gap: 16px; flex-wrap: wrap; }
        .info span { background: #0f3460; padding: 4px 12px; border-radius: 8px; }
        button { 
            background: #e94560; 
            color: #fff; 
            border: none; 
            padding: 8px 18px; 
            border-radius: 8px; 
            font-size: 16px; 
            cursor: pointer; 
            touch-action: manipulation;
        }
        button:hover { background: #c73652; }
        .records {
            margin-top: 12px;
            color: #aaa;
            font-size: 14px;
            text-align: left;
            background: #0f3460;
            border-radius: 8px;
            padding: 8px 12px;
        }
        .records b { color: #fff; }
        .records .top1 { color: #ffd700; }
        .records .top2 { color: #c0c0c0; }
        .records .top3 { color: #cd7f32; }
        .timer-warning { color: #e94560; animation: blink 0.5s infinite alternate; }
        @keyframes blink { from { opacity: 1; } to { opacity: 0.3; } }
    </style>
</head>
<body>
<div class="game">
    <h2>🍎 3 в ряд</h2>
    <canvas id="canvas" width="300" height="300"></canvas>
    <div class="info">
        <div class="info-left">
            <span>🎯 <b id="score">0</b></span>
            <span id="timerDisplay">⏱️ 60</span>
        </div>
        <button id="restartBtn">🔄 Заново</button>
    </div>
    <div class="records" id="recordsDisplay">
        🏆 Лучшие: <span id="recordsList">нет записей</span>
    </div>
</div>
<script>
    // ========== НАСТРОЙКИ ==========
    const SIZE = 8;
    const TILE_SIZE = 300 / SIZE;
    const EMOJIS = ['🍎','⭐','🍒','💎','🍉'];
    const GAME_DURATION = 60; // секунд

    // ========== СОСТОЯНИЕ ==========
    let grid = [];
    let score = 0;
    let selected = null;
    let timer = GAME_DURATION;
    let gameActive = false;
    let timerInterval = null;
    let isProcessing = false;

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const timerEl = document.getElementById('timerDisplay');
    const recordsListEl = document.getElementById('recordsList');

    // ========== РАБОТА С РЕКОРДАМИ (localStorage) ==========
    function getRecords() {
        try {
            return JSON.parse(localStorage.getItem('match3_records')) || [];
        } catch { return []; }
    }

    function saveRecords(records) {
        localStorage.setItem('match3_records', JSON.stringify(records));
    }

    function addRecord(score) {
        let records = getRecords();
        records.push(score);
        records.sort((a,b) => b - a);
        if (records.length > 10) records = records.slice(0, 10);
        saveRecords(records);
        return records;
    }

    function renderRecords() {
        const records = getRecords();
        if (records.length === 0) {
            recordsListEl.textContent = 'нет записей';
            return;
        }
        const medals = ['🥇', '🥈', '🥉'];
        let html = '';
        records.slice(0, 5).forEach((rec, i) => {
            const medal = i < 3 ? medals[i] : `${i+1}.`;
            html += `${medal} ${rec}  `;
        });
        recordsListEl.innerHTML = html;
    }

    // ========== ИГРОВАЯ ЛОГИКА ==========
    function initGrid() {
        grid = [];
        for (let r = 0; r < SIZE; r++) {
            grid[r] = [];
            for (let c = 0; c < SIZE; c++) {
                grid[r][c] = Math.floor(Math.random() * EMOJIS.length);
            }
        }
        while (findMatches().size > 0) {
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    if (grid[r][c] !== null) grid[r][c] = Math.floor(Math.random() * EMOJIS.length);
                }
            }
        }
    }

    function findMatches() {
        let matches = new Set();
        for (let r = 0; r < SIZE; r++) {
            for (let c = 0; c < SIZE - 2; c++) {
                if (grid[r][c] === null) continue;
                if (grid[r][c] === grid[r][c+1] && grid[r][c] === grid[r][c+2]) {
                    matches.add(r+','+c); matches.add(r+','+(c+1)); matches.add(r+','+(c+2));
                }
            }
        }
        for (let r = 0; r < SIZE - 2; r++) {
            for (let c = 0; c < SIZE; c++) {
                if (grid[r][c] === null) continue;
                if (grid[r][c] === grid[r+1][c] && grid[r][c] === grid[r+2][c]) {
                    matches.add(r+','+c); matches.add((r+1)+','+c); matches.add((r+2)+','+c);
                }
            }
        }
        return matches;
    }

    function dropDown() {
        let dropped = false;
        for (let c = 0; c < SIZE; c++) {
            for (let r = SIZE-1; r >= 0; r--) {
                if (grid[r][c] === null) {
                    for (let k = r-1; k >= 0; k--) {
                        if (grid[k][c] !== null) {
                            grid[r][c] = grid[k][c];
                            grid[k][c] = null;
                            dropped = true;
                            break;
                        }
                    }
                    if (grid[r][c] === null) {
                        grid[r][c] = Math.floor(Math.random() * EMOJIS.length);
                        dropped = true;
                    }
                }
            }
        }
        return dropped;
    }

    function processMatches() {
        let matches = findMatches();
        if (matches.size === 0) return false;
        score += matches.size * 10;
        scoreEl.textContent = score;
        for (let pos of matches) {
            let [r,c] = pos.split(',').map(Number);
            grid[r][c] = null;
        }
        while (dropDown()) {}
        return true;
    }

    function processAllMatches() {
        if (isProcessing) return;
        isProcessing = true;
        let anyMatched = false;
        while (true) {
            let matched = processMatches();
            if (!matched) break;
            anyMatched = true;
        }
        isProcessing = false;
        draw();
        if (anyMatched && gameActive) {
            // Проверяем ещё раз после паузы
            setTimeout(() => {
                if (gameActive) processAllMatches();
            }, 100);
        }
    }

    // ========== ОТРИСОВКА ==========
    function draw() {
        ctx.clearRect(0, 0, 300, 300);
        for (let r = 0; r < SIZE; r++) {
            for (let c = 0; c < SIZE; c++) {
                let x = c * TILE_SIZE, y = r * TILE_SIZE;
                ctx.fillStyle = '#1a3a5c';
                ctx.fillRect(x, y, TILE_SIZE-1, TILE_SIZE-1);
                if (grid[r][c] !== null) {
                    ctx.font = (TILE_SIZE-6) + 'px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillStyle = '#fff';
                    ctx.fillText(EMOJIS[grid[r][c]], x + TILE_SIZE/2, y + TILE_SIZE/2 + 2);
                    if (selected && selected[0] === r && selected[1] === c) {
                        ctx.strokeStyle = '#fff';
                        ctx.lineWidth = 3;
                        ctx.strokeRect(x+2, y+2, TILE_SIZE-5, TILE_SIZE-5);
                    }
                }
            }
        }
    }

    // ========== ТАЙМЕР ==========
    function startTimer() {
        if (timerInterval) clearInterval(timerInterval);
        timer = GAME_DURATION;
        timerEl.textContent = '⏱️ ' + timer;
        timerEl.className = '';
        gameActive = true;
        timerInterval = setInterval(() => {
            timer--;
            timerEl.textContent = '⏱️ ' + timer;
            if (timer <= 10) timerEl.className = 'timer-warning';
            if (timer <= 0) {
                clearInterval(timerInterval);
                timerInterval = null;
                gameActive = false;
                timerEl.textContent = '⏱️ 0';
                const records = addRecord(score);
                renderRecords();
                alert('⏰ Время вышло! Твой счёт: ' + score + '\nРекорд: ' + (records[0] || score));
            }
        }, 1000);
    }

    // ========== УПРАВЛЕНИЕ ==========
    function restart() {
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = null;
        gameActive = false;
        initGrid();
        score = 0;
        selected = null;
        scoreEl.textContent = '0';
        renderRecords();
        draw();
        startTimer();
    }

    // ========== ОБРАБОТКА КЛИКОВ ==========
    function handleCanvasClick(e) {
        if (!gameActive) return;
        if (isProcessing) return;
        e.preventDefault();

        const rect = canvas.getBoundingClientRect();
        const scaleX = 300 / rect.width;
        const scaleY = 300 / rect.height;
        let clientX, clientY;
        if (e.touches) {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
            e.preventDefault();
        } else {
            clientX = e.clientX;
            clientY = e.clientY;
        }
        let x = (clientX - rect.left) * scaleX;
        let y = (clientY - rect.top) * scaleY;
        let col = Math.floor(x / TILE_SIZE);
        let row = Math.floor(y / TILE_SIZE);
        if (row >= SIZE || col >= SIZE || row < 0 || col < 0) return;

        if (selected === null) {
            selected = [row, col];
            draw();
            return;
        }

        let [r1, c1] = selected;
        if (r1 === row && c1 === col) {
            selected = null;
            draw();
            return;
        }

        if (Math.abs(r1 - row) + Math.abs(c1 - col) !== 1) {
            selected = [row, col];
            draw();
            return;
        }

        // Меняем
        [grid[r1][c1], grid[row][col]] = [grid[row][col], grid[r1][c1]];
        selected = null;

        // Проверяем совпадения
        let matches = findMatches();
        if (matches.size === 0) {
            // Откат
            [grid[r1][c1], grid[row][col]] = [grid[row][col], grid[r1][c1]];
            draw();
            return;
        }

        // Считаем очки за первый ход
        score += matches.size * 10;
        scoreEl.textContent = score;
        for (let pos of matches) {
            let [r,c] = pos.split(',').map(Number);
            grid[r][c] = null;
        }
        while (dropDown()) {}
        draw();
        // Запускаем цепочку совпадений
        setTimeout(() => {
            if (gameActive) processAllMatches();
        }, 150);
    }

    // ========== СОБЫТИЯ ==========
    canvas.addEventListener('click', handleCanvasClick);
    canvas.addEventListener('touchstart', handleCanvasClick, { passive: false });

    document.getElementById('restartBtn').addEventListener('click', restart);
    document.getElementById('restartBtn').addEventListener('touchstart', function(e) {
        e.preventDefault();
        restart();
    }, { passive: false });

    // ========== СТАРТ ==========
    initGrid();
    renderRecords();
    draw();
    startTimer();
</script>
</body>
</html>
